                                    }
                                }

                                // Apply keyword weights belonging directly to this element
                                activeKeywords.forEach(kw => {
                                    const weight = getKeywordWeight(kw);
                                    if (weight !== 10 && KEYWORDS[el] && KEYWORDS[el].includes(kw)) {
                                        elScore += weight * 2;
                                    }
                                });

                                return elScore;
                            };

                            if (sub.element === 'prismatic') {
                                // PRISMATIC MIMICRY: Prismatic evaluates exactly on par with the best element, preventing double-dipping.
                                let maxScore = evaluateElementSynergy('prismatic');
                                ['solar', 'void', 'arc', 'stasis', 'strand'].forEach(el => {
                                    maxScore = Math.max(maxScore, evaluateElementSynergy(el));
                                });
                                score = maxScore;
                            } else {
                                score = evaluateElementSynergy(sub.element);
                            }
                            
                            return { item: sub, score };
                        });
                        
                        // Pick randomly from the top 3 scoring subclasses to allow flexible starting points
                        chosenSubclass = pickFromScoredList(scoredSubclasses, 3) || subclassPool[Math.floor(Math.random() * subclassPool.length)];
                    }
                }

                if (chosenSubclass && chosenSubclass.element !== 'neutral') {
                    dominantElement = chosenSubclass.element;
                    activeKeywords.add(dominantElement);
                }

                // 4. Ability Selection using Global PCI Pools
                const getValidAbilities = (category, sub) => {
                    if (!sub || !db.abilities[category]) return [];
                    return db.abilities[category].filter(a => {
                        // Strict Prismatic Check using actual valid plugs API
                        if (sub.validPlugs && sub.validPlugs.has(String(a.hash))) {
                            return true;
                        }
                        if (sub.element === 'prismatic') {
                            return false;
                        }

                        const classMatch = a.classConstraint === "shared" || a.classConstraint === sub.classType;
                        let elementMatch = false;
                        
                        if (a.elementConstraint === 'neutral' && ['aspects', 'fragments', 'super', 'grenade', 'melee'].includes(category)) {
                            return false; 
                        }
                        
                        elementMatch = a.elementConstraint === 'neutral' || a.elementConstraint === sub.element;
                        return classMatch && elementMatch;
                    });
                };

                const pickAbilityFromPool = (pool, kwsSet, category = null) => {
                    if (!pool || pool.length === 0) return null;
                    
                    let scored = pool.map(abil => {
                        let score = 0;
                        const text = (abil.name + " " + abil.desc).replace(/[-]/g, ' ').toLowerCase();
                        kwsSet.forEach(kw => { 
                            const safeKw = kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                            if (new RegExp('\\b' + safeKw + '\\b', 'i').test(text)) score += getKeywordWeight(kw); 
                        });
                        
                        // If this exact ability was demanded by the Exotic Armor, assign it a hard override score
                        if (new RegExp('\\b' + abil.name.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '(?:s)?\\b', 'i').test(armorFullText)) {
                            score += 1000;
                        }

                        // NEW: Elemental Super Override (Equates to exact ability match)
                        if (category === 'super' && abil.elementConstraint && abil.elementConstraint !== 'neutral' && abil.elementConstraint !== 'prismatic') {
                            if (new RegExp('\\b' + abil.elementConstraint + '\\s+super\\b', 'i').test(armorFullText)) {
                                score += 1000;
                            }
                        }
                        
                        return { item: abil, score };
                    });
                    
                    // Pick from the top 3 scoring abilities for this slot
                    const picked = pickFromScoredList(scored, 3);
                    if (picked) {
                        addKeywords((picked.name + " " + picked.desc));
                    }
                    return picked;
                };

                const superAbil = pickAbilityFromPool(getValidAbilities('super', chosenSubclass), activeKeywords, 'super');
                const classAbil = pickAbilityFromPool(getValidAbilities('classAbility', chosenSubclass), activeKeywords, 'classAbility');
                const jump = pickAbilityFromPool(getValidAbilities('jump', chosenSubclass), activeKeywords, 'jump');
                const melee = pickAbilityFromPool(getValidAbilities('melee', chosenSubclass), activeKeywords, 'melee');
                
                // Grenade Selection
                let grenadePool = getValidAbilities('grenade', chosenSubclass);
                
                const damageGrenadeRegexes = [
                    /grenade final blow/i, 
                    /grenade kill/i, 
                    /grenade damage/i, 
                    /damage .*? with .*? grenade/i, 
                    /kills? .*? with .*? grenade/i, 
                    /defeating .*? with .*? grenade/i,
                    /final blows? .*? with .*? grenade/i
                ];

                const combinedText = (armorFullText + " " + weaponText).toLowerCase();
                const needsGrenadeDamage = damageGrenadeRegexes.some(regex => regex.test(combinedText));

                if (needsGrenadeDamage) {
                    grenadePool = grenadePool.filter(g => g.name.toLowerCase() !== "healing grenade");
                }
                
                // SPECIAL CASE: Getaway Artist strictly requires an Arc grenade to consume
                if (chosenArmor && chosenArmor.name.toLowerCase().includes("getaway artist")) {
                    const arcGrenades = grenadePool.filter(g => g.elementConstraint === 'arc');
                    if (arcGrenades.length > 0) {
                        grenadePool = arcGrenades;
                    }
                }

                const grenade = pickAbilityFromPool(grenadePool, activeKeywords, 'grenade');
                const isHealingGrenade = grenade && grenade.name.toLowerCase() === "healing grenade";

                // Aspects - Pick up to 2
                let aspects = [];
                let fragmentCapacity = 0;
                const aspectPool = getValidAbilities('aspects', chosenSubclass);
                
                if (aspectPool.length > 0) {
                    const scoredAspects = aspectPool.filter(abil => {
                        if (!isHealingGrenade) return true;
                        const text = (abil.name + " " + abil.desc).replace(/[-]/g, ' ').toLowerCase();
                        return !damageGrenadeRegexes.some(r => r.test(text));
                    }).map(abil => {
                        let score = 0;
                        const text = (abil.name + " " + abil.desc).replace(/[-]/g, ' ').toLowerCase();
                        activeKeywords.forEach(kw => { 
                            const safeKw = kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                            if (new RegExp('\\b' + safeKw + '\\b', 'i').test(text)) score += getKeywordWeight(kw) * 1.5; 
                        });
                        return { item: abil, score };
                    });
                    
                    let aspect1 = pickFromScoredList(scoredAspects, 3);
                    if (aspect1) {
                        aspects.push(aspect1);
                        fragmentCapacity += aspect1.fragmentSlots || 0;
                        addKeywords((aspect1.name + " " + aspect1.desc));
                        
                        let remainingAspects = scoredAspects.filter(a => a.item.hash !== aspect1.hash);
                        let aspect2 = pickFromScoredList(remainingAspects, 3);
                        if (aspect2) {
                            aspects.push(aspect2);
                            fragmentCapacity += aspect2.fragmentSlots || 0;
                            addKeywords((aspect2.name + " " + aspect2.desc));
                        }
                    }
                }

                // Fragments
                let fragments = [];
                const fragPool = getValidAbilities('fragments', chosenSubclass);
                if (fragPool.length > 0 && fragmentCapacity > 0) {
                    const strictFrags = [];
                    
                    fragPool.forEach(abil => {
                        const text = (abil.name + " " + abil.desc).replace(/[-]/g, ' ').toLowerCase();
                        
                        if (isHealingGrenade && damageGrenadeRegexes.some(r => r.test(text))) return;

                        let score = 0;
                        let hasKeywordMatch = false;

                        activeKeywords.forEach(kw => {
                            const safeKw = kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                            if (new RegExp('\\b' + safeKw + '\\b', 'i').test(text)) {
                                score += getKeywordWeight(kw);
                                hasKeywordMatch = true;
                            }
                        });

                        if (hasKeywordMatch) {
                            strictFrags.push({ item: abil, score });
                        }
                    });
                    
                    for (let i = 0; i < fragmentCapacity; i++) {
                        let remainingFrags = strictFrags.filter(f => !fragments.some(sel => sel.hash === f.item.hash));
                        let picked = pickFromScoredList(remainingFrags, 4); // Fragments have deep pools, 4 gives good variance
                        if (picked) fragments.push(picked);
                    }
                }

                // 6. Artifact & Perks - Multi-Artifact Synergy Evaluation
                let scoredArtifacts = [];

                if (db.artifacts && db.artifacts.length > 0) {
                    db.artifacts.forEach(artifact => {
                        let currentArtifactScore = 0;
                        let currentSelectedPerks = [];

                        // Score all perks in the artifact
                        const scoredCols = artifact.columns.map(column => {
                            return column.map(perk => {
                                let score = 0;
                                const text = perk.desc.replace(/[-]/g, ' ').toLowerCase(); 
                                
                                let mentionsOtherWeapons = false;
                                let mentionsChosenWeapon = false;
                                let abilityElementMismatch = false;
                                let precisionMismatch = false;

                                if (chosenWeapon && chosenWeapon.weaponType && db.weaponTypes) {
                                    db.weaponTypes.forEach(wt => {
                                        if (!wt) return;
                                        const safeWt = wt.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                                        
                                        const regex = new RegExp('(?:\\b(\\w+)\\W+)?(?:\\b(\\w+)\\W+)?(?:\\b(\\w+)\\W+)?\\b' + safeWt + 's?\\b', 'gi');
                                        let match;
                                        let foundWt = false;
                                        let fitsOurWeapon = false;
                                        
                                        while ((match = regex.exec(text)) !== null) {
                                            foundWt = true;
                                            const words = [match[1], match[2], match[3]].map(w => w ? w.toLowerCase() : "");
                                            const elements = ['solar', 'void', 'arc', 'stasis', 'strand', 'kinetic'];
                                            const precedingElements = words.filter(w => elements.includes(w));
                                            
                                            if (wt === chosenWeapon.weaponType) {
                                                if (precedingElements.length === 0 || precedingElements.includes(chosenWeapon.damageType)) {
                                                    fitsOurWeapon = true;
                                                }
                                            }
                                        }

                                        if (foundWt) {
                                            if (wt === chosenWeapon.weaponType && fitsOurWeapon) {
                                                mentionsChosenWeapon = true;
                                            } else {
                                                mentionsOtherWeapons = true;
                                            }
                                        }
                                    });
                                }

                                // NEW: Strict Elemental Weapon Checks (e.g. "Stasis weapon hits", "Solar damage final blows")
                                let demandedWeaponElements = [];
                                ['kinetic', 'solar', 'void', 'arc', 'stasis', 'strand'].forEach(el => {
                                    const regex = new RegExp('\\b' + el + '\\b(?:\\s+or\\s+\\w+)?(?:\\s+and\\s+\\w+)?\\s+(?:damage\\s+)?(?:weapons?|final blows?|kills?|hits?)\\b', 'i');
                                    if (regex.test(text)) demandedWeaponElements.push(el);
                                });

                                if (demandedWeaponElements.length > 0) {
                                    if (chosenWeapon && !demandedWeaponElements.includes(chosenWeapon.damageType)) {
                                        mentionsOtherWeapons = true; // Demands an element our weapon doesn't have
                                    } else {
                                        mentionsChosenWeapon = true; // Perfect match
                                    }
                                }

                                // NEW: Strict Elemental Ability Checks (e.g. "Stasis grenade", "Void ability", "Arc super")
                                let demandedAbilityElements = [];
                                ['solar', 'void', 'arc', 'stasis', 'strand'].forEach(el => {
                                    const regex = new RegExp('\\b' + el + '\\b\\s+(?:damage\\s+)?(?:grenades?|melees?|super|abilities|ability)\\b', 'i');
                                    if (regex.test(text)) demandedAbilityElements.push(el);
                                });

                                if (demandedAbilityElements.length > 0) {
                                    // Gather the elements of all currently selected abilities in this build
                                    const activeElements = new Set([dominantElement]);
                                    if (superAbil && superAbil.elementConstraint && superAbil.elementConstraint !== 'neutral' && superAbil.elementConstraint !== 'prismatic') activeElements.add(superAbil.elementConstraint);
                                    if (grenade && grenade.elementConstraint && grenade.elementConstraint !== 'neutral' && grenade.elementConstraint !== 'prismatic') activeElements.add(grenade.elementConstraint);
                                    if (melee && melee.elementConstraint && melee.elementConstraint !== 'neutral' && melee.elementConstraint !== 'prismatic') activeElements.add(melee.elementConstraint);
                                    if (classAbil && classAbil.elementConstraint && classAbil.elementConstraint !== 'neutral' && classAbil.elementConstraint !== 'prismatic') activeElements.add(classAbil.elementConstraint);
                                    
                                    if (demandedAbilityElements.some(el => activeElements.has(el))) {
                                        score += 50; // Build perfectly matches the required ability element!
                                    } else {
                                        abilityElementMismatch = true; // Build is entirely missing the required ability element. Ban it.
                                    }
                                }

                                // NEW: Strict Precision Check
                                // If the perk requires precision hits, but we are holding a non-precision weapon, ban it.
                                if (precisionRegex.test(text)) {
                                    if (chosenWeapon && nonPrecisionTypes.includes(chosenWeapon.weaponType)) {
                                        precisionMismatch = true;
                                    }
                                }

                                activeKeywords.forEach(kw => {
                                    const safeKw = kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                                    if (new RegExp('\\b' + safeKw + '\\b', 'i').test(text)) {
                                        score += getKeywordWeight(kw) * 1.5;
                                    }
                                });

                                if (mentionsChosenWeapon) score += 25; 
                                else if (mentionsOtherWeapons) score -= 1000; 
                                
                                if (abilityElementMismatch) score -= 1000;
                                if (precisionMismatch) score -= 1000;

                                return { ...perk, score };
                            });
                        });

                        const getPool = (maxColIndex) => {
                            let pool = [];
                            for (let i = 0; i <= Math.min(maxColIndex, scoredCols.length - 1); i++) {
                                pool.push(...scoredCols[i]);
                            }
                            return pool
                                .filter(p => !currentSelectedPerks.some(sel => sel.hash === p.hash))
                                .map(p => ({...p, rand: Math.random()}))
                                .sort((a, b) => {
                                    if (b.score === a.score) return b.rand - a.rand;
                                    return b.score - a.score;
                                });
                        };

                        let t1Pool = getPool(0);
                        for (let i = 0; i < 2; i++) if (t1Pool.length > 0) currentSelectedPerks.push(t1Pool.shift());

                        let t2Pool = getPool(1);
                        for (let i = 0; i < 3; i++) if (t2Pool.length > 0) currentSelectedPerks.push(t2Pool.shift());

                        let t3Pool = getPool(2);
                        for (let i = 0; i < 2; i++) if (t3Pool.length > 0) currentSelectedPerks.push(t3Pool.shift());

                        currentSelectedPerks.forEach(perk => currentArtifactScore += perk.score);

                        scoredArtifacts.push({ 
                            item: { artifact, perks: currentSelectedPerks }, 
                            score: currentArtifactScore 
                        });
                    });
                }

                let bestArtifact = null;
                let bestArtifactPerks = [];
                if (scoredArtifacts.length > 0) {
                    // Pick randomly between the top 2 overall artifact paths
                    const chosenData = pickFromScoredList(scoredArtifacts, 2);
                    if (chosenData) {
                        bestArtifact = chosenData.artifact;
                        bestArtifactPerks = chosenData.perks;
                    }
                }

                const statScores = {
                    Health: finalClass === 0 ? 80 : 60, // Titans naturally favor defensive scaling
                    Class: finalClass === 1 ? 60 : 30, // Hunters naturally want class ability stat
                    Melee: 20,
                    Grenade: 20,
                    Super: 10,
                    Weapons: 20
                };

                const buildText = [
                    armorFullText,
                    superAbil?.desc, superAbil?.name,
                    melee?.desc, melee?.name,
                    grenade?.desc, grenade?.name,
                    classAbil?.desc, classAbil?.name,
                    ...aspects.map(a => a?.desc),
                    ...fragments.map(f => f?.desc)
                ].filter(Boolean).join(" ").toLowerCase();

                // Weighted Keyword Counting
                const countOccurrences = (str, word) => {
                    const regex = new RegExp(`\\b${word}\\b`, 'gi');
                    return (str.match(regex) || []).length;
                };

                const grenadeCount = countOccurrences(buildText, "grenade") + countOccurrences(buildText, "cure") + countOccurrences(buildText, "restoration");
                const meleeCount = countOccurrences(buildText, "melee") + countOccurrences(buildText, "glaive");
                const superCount = countOccurrences(buildText, "super");
                const classAbilCount = countOccurrences(buildText, "class ability") + countOccurrences(buildText, "dodge") + countOccurrences(buildText, "barricade") + countOccurrences(buildText, "rift") + countOccurrences(buildText, "overshield");
                const weaponCount = countOccurrences(buildText, "weapon") + countOccurrences(buildText, "precision") + countOccurrences(buildText, "ammo") + countOccurrences(buildText, "reload") + countOccurrences(buildText, "handling") + countOccurrences(buildText, "damage");
                const healthCount = countOccurrences(buildText, "orb of power") + countOccurrences(buildText, "orbs of power") + countOccurrences(buildText, "flinch") + countOccurrences(buildText, "shield");

                statScores.Grenade += (grenadeCount * 15);
                statScores.Melee += (meleeCount * 15);
                statScores.Super += (superCount * 10);
                statScores.Weapons += (weaponCount * 10);
                statScores.Class += (classAbilCount * 15);
                statScores.Health += (healthCount * 15);

                const sortedStats = Object.entries(statScores).sort((a, b) => b[1] - a[1]);
                const primaryStat = sortedStats[0][0];
                const secondaryStat = sortedStats[1][0];

                // 7. Armor Sets
                const scoredSets = db.sets.map(set => {
                    let score = 0;
                    activeKeywords.forEach(kw => {
                        const safeKw = kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                        if (new RegExp('\\b' + safeKw + '\\b', 'i').test(set.synergyText.replace(/[-]/g, ' '))) {
                            score += getKeywordWeight(kw);
                        }
                    });
                    return { ...set, score: score, rand: Math.random() }; 
                }).sort((a, b) => {
                    if (b.score === a.score) return b.rand - a.rand;
                    return b.score - a.score;
                });

                let finalSets = [];
                const prefers4Piece = Math.random() > 0.5;
                const setsWith4 = scoredSets.filter(s => s.has4);
                const setsWith2 = scoredSets.filter(s => s.has2);

                if (prefers4Piece && setsWith4.length > 0) {
                    const chosen4Piece = setsWith4[0];
                    const perk2 = chosen4Piece.perks.find(p => p.count === 2);
                    const perk4 = chosen4Piece.perks.find(p => p.count === 4);
                    if (perk2) finalSets.push({ setName: chosen4Piece.name, perk: perk2, setDef: chosen4Piece });
                    if (perk4) finalSets.push({ setName: chosen4Piece.name, perk: perk4, setDef: chosen4Piece });
                } else if (setsWith2.length >= 2) {
                    finalSets.push({ setName: setsWith2[0].name, perk: setsWith2[0].perks.find(p => p.count === 2), setDef: setsWith2[0] });
                    finalSets.push({ setName: setsWith2[1].name, perk: setsWith2[1].perks.find(p => p.count === 2), setDef: setsWith2[1] });
                } else if (setsWith2.length === 1) {
                    finalSets.push({ setName: setsWith2[0].name, perk: setsWith2[0].perks.find(p => p.count === 2), setDef: setsWith2[0] });
                }

                setBuild({
                    class: CLASS_TYPES[finalClass],
                    element: dominantElement,
                    armor: chosenArmor,
                    armorPerks: chosenArmorPerks,
                    weapon: chosenWeapon,
                    subclass: chosenSubclass,
                    actualSetBonuses: finalSets,
                    artifact: bestArtifact,
                    artifactPerks: bestArtifactPerks,
                    stats: { primary: primaryStat, secondary: secondaryStat },
                    abilities: {
                        superAbil,
                        grenade,
                        melee,
                        classAbil,
                        jump,
                        aspects,
                        fragments,
                        fragmentCapacity
                    }
                });
            };

            // NEW: Centralized JSON Construction Helper
            const createLoadoutObject = (b) => {
                if (!b) return null;
                
                const equippedItems = [];
                if (b.weapon) equippedItems.push({ hash: Number(b.weapon.hash) });
                
                if (b.subclass) {
                    const socketOverrides = {};
                    
                    if (b.abilities.superAbil) socketOverrides["0"] = Number(b.abilities.superAbil.hash);
                    if (b.abilities.classAbil) socketOverrides["1"] = Number(b.abilities.classAbil.hash);
                    if (b.abilities.jump) socketOverrides["2"] = Number(b.abilities.jump.hash);
                    if (b.abilities.melee) socketOverrides["3"] = Number(b.abilities.melee.hash);
                    if (b.abilities.grenade) socketOverrides["4"] = Number(b.abilities.grenade.hash);
                    
                    b.abilities.aspects.forEach((a, i) => { 
                        if (a) socketOverrides[String(5 + i)] = Number(a.hash); 
                    });
                    
                    b.abilities.fragments.forEach((f, i) => { 
                        if (f) socketOverrides[String(7 + i)] = Number(f.hash); 
                    });

                    equippedItems.push({
                        hash: Number(b.subclass.hash),
                        socketOverrides: socketOverrides
                    });
                }

                const classTypeNum = parseInt(Object.keys(CLASS_TYPES).find(key => CLASS_TYPES[key] === b.class) || "0");
                
                let notes = `Generated using Random Build tool. Focuses on ${b.weapon?.name} and ${b.armor?.name}.`;
                if (b.armorPerks && b.armorPerks.length > 0) {
                    notes = `Generated using Random Build tool. Focuses on ${b.weapon?.name} and ${b.armor?.name} (${b.armorPerks.map(p => p.name.replace('Spirit of ', '')).join(' / ')}).`;
                }

                const loadout = {
                    name: `Random ${b.class} Build`,
                    notes: notes,
                    classType: classTypeNum,
                    equipped: equippedItems,
                    unequipped: [],
                    parameters: {
                        // Secret builderData that DIM ignores, but we use for hydration
                        builderData: {
                            stats: b.stats,
                            armorPerks: b.armorPerks?.map(p => p.hash) || [],
                            element: b.element
                        }
                    }
                };
                
                if (b.artifactPerks && b.artifactPerks.length > 0) {
                    loadout.parameters.artifactUnlocks = {
                        unlockedItemHashes: b.artifactPerks.map(p => Number(p.hash))
                    };
                    if (b.artifact && b.artifact.seasonNumber) {
                        loadout.parameters.artifactUnlocks.seasonNumber = b.artifact.seasonNumber;
                    }
                }

                if (b.actualSetBonuses && b.actualSetBonuses.length > 0) {
                    loadout.parameters.setBonuses = {};
                    b.actualSetBonuses.forEach(sb => {
                        const current = loadout.parameters.setBonuses[sb.setDef.hash] || 0;
                        loadout.parameters.setBonuses[sb.setDef.hash] = Math.max(current, sb.perk.count);
                    });
                }

                if (b.armor) {
                    loadout.parameters.exoticArmorHash = Number(b.armor.hash);
                }

                return loadout;
            };

            const openInDim = () => {
                const loadout = createLoadoutObject(build);
                if (!loadout) return;
                
                // Clone and strip our secret data off before passing to DIM to guarantee compliance
                const dimLoadout = JSON.parse(JSON.stringify(loadout));
                delete dimLoadout.parameters.builderData;

                const jsonStr = JSON.stringify(dimLoadout);
                const dimUrl = `https://app.destinyitemmanager.com/loadouts?loadout=${encodeURIComponent(jsonStr)}`;
                
                window.open(dimUrl, '_blank');
            };
            
            const openShare = async () => {
                const loadout = createLoadoutObject(build);
                if (!loadout) return;
                
                const jsonStr = JSON.stringify(loadout);
                
                // Safe UTF-8 to Base64 encoding
                const base64Str = btoa(unescape(encodeURIComponent(jsonStr)));
                
                // We still encodeURIComponent the base64 string to protect '+' and '=' characters in the URL
                const url = `https://d2builder.algotician.com?loadout=${encodeURIComponent(base64Str)}`;
                
                // NEW: Web Share API Integration for Mobile & Supported Desktops
                if (navigator.share) {
                    try {
                        await navigator.share({
                            title: 'Destiny 2 Build Generator',
                            url: url
                        });
                        return; // Successfully shared natively, bypass the modal
                    } catch (err) {
                        if (err.name === 'AbortError') {
                            // User intentionally dismissed the native share sheet. Do nothing.
                            return; 
                        }
                        console.log("Native share failed, falling back to modal.", err);
                    }
                }
                
                // Fallback: If Web Share API is unsupported or failed for unexpected reasons, open the modal
                setShareUrl(url);
                setShowShareModal(true);
                setCopied(false);
            };

            const copyShareUrl = () => {
                const input = document.createElement('input');
                input.value = shareUrl;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000); // Reset button text after 2 seconds
            };

            if (!isReady) {
                return (
                    <div className="flex flex-col items-center justify-center min-h-screen">
                        <div className="spinner mb-4"></div>
                        <h2 className="text-xl font-bold tracking-wider">{status}</h2>
                        <p className="text-slate-400 mt-2 max-w-md text-center text-sm">Downloading and parsing manifest data. This runs entirely in your browser.</p>
                    </div>
                );
            }

            return (
                <div className="max-w-5xl mx-auto p-4 py-12">
                    <div className="text-center mb-10">
                        <h1 className="text-4xl font-black uppercase tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-slate-200 to-slate-500 mb-2">Destiny 2 Build Generator</h1>
                        <p className="text-slate-400">Set your starting points, or leave them blank for true chaos.</p>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-12 gap-6 mb-8">
                        <div className="d2-card rounded-lg p-6 md:col-span-4 self-start md:sticky md:top-4">
                            <h3 className="text-lg font-bold mb-4 uppercase tracking-wider text-slate-300">Seed Parameters</h3>
                            
                            <div className="space-y-4">
                                <div>
                                    <label className="block text-xs uppercase text-slate-400 mb-1">Class</label>
                                    <select value={selClass} onChange={e => { setSelClass(e.target.value); setSelArmor(""); setSelSubclass(""); }} className="w-full bg-slate-800 border border-slate-600 rounded p-2 text-white focus:outline-none focus:border-blue-400">
                                        <option value="">Any Class</option>
                                        <option value="0">Titan</option>
                                        <option value="1">Hunter</option>
                                        <option value="2">Warlock</option>
                                    </select>
                                </div>
                                
                                <div>
                                    <label className="block text-xs uppercase text-slate-400 mb-1">Specific Exotic Armor</label>
                                    <select value={selArmor} onChange={e => setSelArmor(e.target.value)} className="w-full bg-slate-800 border border-slate-600 rounded p-2 text-white focus:outline-none focus:border-blue-400">
                                        <option value="">Random Armor</option>
                                        {db.armor.filter(a => selClass === "" || a.classType.toString() === selClass).sort((a,b)=>a.name.localeCompare(b.name)).map(a => (
                                            <option key={a.hash} value={a.hash}>{a.name}</option>
                                        ))}
                                    </select>
                                </div>

                                <div>
                                    <label className="block text-xs uppercase text-slate-400 mb-1">Specific Exotic Weapon</label>
                                    <select value={selWeapon} onChange={e => setSelWeapon(e.target.value)} className="w-full bg-slate-800 border border-slate-600 rounded p-2 text-white focus:outline-none focus:border-blue-400">
                                        <option value="">Random Weapon (Synergy Based)</option>
                                        {db.weapons.sort((a,b)=>a.name.localeCompare(b.name)).map(w => (
                                            <option key={w.hash} value={w.hash}>{w.name}</option>
                                        ))}
                                    </select>
                                </div>

                                <div>
                                    <label className="block text-xs uppercase text-slate-400 mb-1">Subclass</label>
                                    <select value={selSubclass} onChange={e => setSelSubclass(e.target.value)} className="w-full bg-slate-800 border border-slate-600 rounded p-2 text-white focus:outline-none focus:border-blue-400">

                                        <div className="flex gap-2">

                                            <div>
                                                <div className="flex items-center gap-2 mb-1">

                                                    {build.weapon?.damageType && (
                                                        <span className={`text-[9px] uppercase px-1.5 py-0.5 rounded font-bold tracking-wider border ${
                                                            build.weapon.damageType === 'solar' ? 'bg-orange-900/30 text-orange-400 border-orange-800' :
                                                            build.weapon.damageType === 'void' ? 'bg-purple-900/30 text-purple-400 border-purple-800' :
                                                            build.weapon.damageType === 'arc' ? 'bg-cyan-900/30 text-cyan-400 border-cyan-800' :
                                                            build.weapon.damageType === 'stasis' ? 'bg-blue-900/30 text-blue-400 border-blue-800' :
                                                            build.weapon.damageType === 'strand' ? 'bg-green-900/30 text-green-400 border-green-800' :
                                                            'bg-slate-700/30 text-slate-300 border-slate-600'
                                                        }`}>
                                                            {build.weapon.damageType}
                                                        </span>
                                                    )}
                                                    {build.weapon?.ammoType && (
                                                        <span className={`text-[9px] uppercase px-1.5 py-0.5 rounded font-bold tracking-wider border ${
                                                            build.weapon.ammoType === 'primary' ? 'bg-slate-100/10 text-slate-100 border-slate-300' :

                                                            build.weapon.ammoType === 'heavy' ? 'bg-purple-500/20 text-purple-400 border-purple-500' :
                                                            'bg-slate-700/30 text-slate-300 border-slate-600'
                                                        }`}>
                                                            {build.weapon.ammoType}
                                                        </span>
                                                    )}
                                                </div>
                                                <div className="font-bold text-[#ceae33] text-lg leading-none mb-1.5">{build.weapon?.name}</div>
                                                {build.weapon?.perkName && <div className="text-xs font-semibold text-slate-300 mb-0.5">{build.weapon.perkName}</div>}
                                                <div className="text-[11px] text-slate-400 leading-tight">{build.weapon?.desc}</div>
                                            </div>
                                        </div>
                                        <div className="bg-slate-800/50 rounded p-4 flex gap-4 items-start">
                                            {build.armor?.icon && <img src={build.armor.icon} className="w-16 h-16 rounded border-2 border-[#ceae33] shrink-0 mt-1" alt="Armor" />}
                                            <div>
                                                <div className="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1">Exotic Armor</div>
                                                <div className="font-bold text-[#ceae33] text-lg leading-none mb-1.5">{build.armor?.name}</div>
                                                
                                                {build.armorPerks && build.armorPerks.length > 0 ? (
                                                    <div className="mt-3 space-y-2">
                                                        {build.armorPerks.map((p, idx) => (
                                                            <div key={idx} className="flex gap-2 items-start bg-slate-900/50 p-2 rounded border border-slate-700/50">
                                                                {p.icon && <img src={p.icon} className="w-6 h-6 rounded border border-slate-600" alt="Perk" />}
                                                                <div>
                                                                    <div className="text-xs font-bold text-slate-200 leading-none mb-1">{p.name}</div>
                                                                    <div className="text-[10px] text-slate-400 leading-tight">{p.desc}</div>
                                                                </div>
                                                            </div>

                                                    </div>

                                                        {build.armor?.perkName && <div className="text-xs font-semibold text-slate-300 mb-0.5">{build.armor.perkName}</div>}

                                                    </React.Fragment>
                                                )}
                                            </div>
                                        </div>
                                    </div>

                                    {}
                                    <div className="bg-slate-800/50 rounded p-4 mb-6 flex flex-row items-center justify-around border border-slate-700/50 shadow-inner">
                                        <div className="text-center">
                                            <div className="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1">Recommended Primary Stat</div>
                                            <div className="font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 text-2xl tracking-wider">{build.stats.primary}</div>
                                        </div>

                                            <div className="font-bold text-slate-200 text-xl tracking-wider">{build.stats.secondary}</div>
                                        </div>

                                    <div className="bg-slate-800/50 rounded p-5 mb-4">

                                        <div className="flex items-center gap-4 mb-6 bg-slate-900/50 p-3 rounded">
                                            {build.subclass?.icon && <img src={build.subclass.icon} className="w-12 h-12 rounded-full bg-slate-800" alt="Subclass" />}
                                            <div>
                                                <span className="font-bold text-xl block text-white">{build.subclass?.name || "Subclass"}</span>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 text-sm">
                                            {[
                                                { label: 'Super', data: build.abilities.superAbil },
                                                { label: 'Class Ability', data: build.abilities.classAbil },
                                                { label: 'Movement', data: build.abilities.jump },
                                                { label: 'Melee', data: build.abilities.melee },
                                                { label: 'Grenade', data: build.abilities.grenade }
                                            ].map((slot, i) => slot.data && (
                                                <div key={i} className="flex items-start gap-3 bg-slate-900/50 p-3 rounded">
                                                    {slot.data.icon && <img src={slot.data.icon} className="w-10 h-10 rounded" alt={slot.label} />}
                                                    <div>
                                                        <span className="text-slate-400 block text-[10px] font-bold uppercase tracking-wider mb-1">{slot.label}</span>
                                                        <span className="font-semibold text-slate-200 block text-base leading-none mb-1">{slot.data.name}</span>
                                                        <p className="text-[11px] text-slate-400 leading-tight">{slot.data.desc}</p>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    
                                    {build.abilities.aspects && build.abilities.aspects.length > 0 && (
                                        <div className="bg-slate-800/50 rounded p-5 mb-4">
                                            <h3 className="text-sm font-bold uppercase tracking-widest mb-4 border-b border-slate-700 pb-2 text-slate-300">Aspects</h3>

                                                {build.abilities.aspects.map((aspect, i) => aspect && (
                                                    <div key={i} className="flex items-start gap-3 bg-slate-900/50 p-3 rounded">
                                                        {aspect.icon && <img src={aspect.icon} className="w-12 h-12 rounded border border-slate-700" alt="Aspect" />}

                                    {build.abilities.fragments && build.abilities.fragments.length > 0 && (
                                        <div className="bg-slate-800/50 rounded p-5 mb-4">
                                            <h3 className="text-sm font-bold uppercase tracking-widest mb-4 border-b border-slate-700 pb-2 text-slate-300 flex justify-between items-center">
                                                Fragments
                                                <span className="text-[10px] bg-slate-900 px-3 py-1 rounded-full text-slate-300 font-normal">
                                                    {build.abilities.fragments.length} / {build.abilities.fragmentCapacity} Energy Used
                                                </span>
                                            </h3>
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 text-sm">
                                                {build.abilities.fragments.map((frag, i) => frag && (
                                                    <div key={i} className="flex items-start gap-3 bg-slate-900/50 p-3 rounded">
                                                        {frag.icon && <img src={frag.icon} className="w-10 h-10 rounded border border-slate-700" alt="Fragment" />}
                                                        <div>
                                                            <div className="flex flex-wrap items-center gap-2 mb-1">

                                                                {frag.stats && frag.stats.length > 0 && frag.stats.map((stat, idx) => (

                                    {build.artifact && build.artifactPerks && build.artifactPerks.length > 0 && (
                                        <div className="bg-slate-800/50 rounded p-5 mb-4">
                                            <h3 className="text-sm font-bold uppercase tracking-widest mb-4 border-b border-slate-700 pb-2 text-slate-300 flex justify-between items-center">
                                                Seasonal Artifact
                                                <span className="flex items-center gap-2 bg-slate-900 px-3 py-1 rounded-full">
                                                    <img src={build.artifact.icon} className="w-4 h-4 rounded-full" alt="Artifact" />
                                                    <span className="text-[10px] text-slate-300 font-normal">{build.artifact.name}</span>
                                                </span>
                                            </h3>
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 text-sm">
                                                {build.artifactPerks.map((perk, i) => (

                                    {build.actualSetBonuses && build.actualSetBonuses.length > 0 && (
                                        <div className="bg-slate-800/50 rounded p-5 mt-auto">
                                            <h3 className="text-sm font-bold uppercase tracking-widest mb-4 border-b border-slate-700 pb-2 text-slate-300">Armor Set Bonuses</h3>
                                            <div className="space-y-3">
                                                {build.actualSetBonuses.map((setBonus, i) => (
                                                    <div key={i} className="bg-slate-900/50 p-3 rounded text-sm">
                                                        <div className="font-bold text-[#ceae33] text-[10px] uppercase tracking-wider mb-1">{setBonus.setName} ({setBonus.perk.count}-Piece)</div>
                                                        <div className="text-slate-200 font-semibold mb-1 text-base leading-none">{setBonus.perk.name}</div>
                                                        <div className="text-slate-400 text-xs leading-relaxed">{setBonus.perk.description}</div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                </div>
                            )}
                        </div>
                    </div>
                    
                    {/* Share Modal Popup */}
                    {showShareModal && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-slate-900 border border-slate-700 rounded-lg p-6 max-w-lg w-full shadow-2xl relative">
                                <button 
                                    onClick={() => setShowShareModal(false)}
                                    className="absolute top-4 right-4 text-slate-400 hover:text-white transition-colors"
                                >
                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                                    </svg>
                                </button>
                                <h3 className="text-xl font-black text-white mb-2 uppercase tracking-widest border-b border-slate-700 pb-2">Share Loadout</h3>
                                <p className="text-slate-400 text-sm mb-6">Copy this link to share your exact build, including generated stats and exotic traits.</p>
                                
                                <div className="flex flex-col sm:flex-row items-stretch sm:items-center gap-2">
                                    <input 
                                        type="text" 
                                        readOnly 
                                        value={shareUrl}
                                        className="w-full bg-slate-800 border border-slate-600 rounded p-3 text-slate-300 text-sm focus:outline-none focus:border-blue-400 font-mono"
                                        onClick={(e) => e.target.select()}
                                    />
                                    <button 
                                        onClick={copyShareUrl}
                                        className={`px-6 py-3 rounded font-bold uppercase tracking-wider transition-colors shrink-0 shadow-lg ${copied ? 'bg-emerald-600 hover:bg-emerald-500 text-white' : 'bg-blue-600 hover:bg-blue-500 text-white'}`}
                                    >
                                        {copied ? 'Copied!' : 'Copy'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
