<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destiny 2 Build Generator</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for in-browser JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            background-color: #0f172a;
            color: #f8fafc;
            font-family: 'Inter', -apple-system, sans-serif;
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #0f172a 70%);
            min-height: 100vh;
        }
        
        .d2-card {
            background-color: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.5), 0 2px 4px -1px rgba(0, 0, 0, 0.3);
        }

        .element-bg-solar { background-image: linear-gradient(135deg, rgba(234, 88, 12, 0.15) 0%, transparent 100%); border-top: 2px solid #ea580c; }
        .element-bg-void { background-image: linear-gradient(135deg, rgba(147, 51, 234, 0.15) 0%, transparent 100%); border-top: 2px solid #9333ea; }
        .element-bg-arc { background-image: linear-gradient(135deg, rgba(6, 182, 212, 0.15) 0%, transparent 100%); border-top: 2px solid #06b6d4; }
        .element-bg-stasis { background-image: linear-gradient(135deg, rgba(59, 130, 246, 0.15) 0%, transparent 100%); border-top: 2px solid #3b82f6; }
        .element-bg-strand { background-image: linear-gradient(135deg, rgba(34, 197, 94, 0.15) 0%, transparent 100%); border-top: 2px solid #22c55e; }
        .element-bg-kinetic, .element-bg-neutral { background-image: linear-gradient(135deg, rgba(148, 163, 184, 0.15) 0%, transparent 100%); border-top: 2px solid #94a3b8; }
        .element-bg-prismatic { background-image: linear-gradient(135deg, rgba(236, 72, 153, 0.15) 0%, transparent 100%); border-top: 2px solid #ec4899; }

        .spinner {
            border: 3px solid rgba(255,255,255,0.1);
            border-radius: 50%;
            border-top: 3px solid #38bdf8;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const KEYWORDS = {
            solar: ["scorch", "ignite", "cure", "restoration", "radiant", "solar", "fire", "burn", "daybreak", "well of radiance", "golden gun", "blade barrage", "hammer of sol", "burning maul", "fusion grenade"],
            void: ["suppress", "weaken", "volatile", "devour", "invisibility", "overshield", "void", "nova bomb", "nova warp", "shadowshot", "spectral blades", "ward of dawn", "sentinel shield", "tether"],
            arc: ["jolt", "blind", "amplified", "ionic trace", "arc", "lightning", "stormtrance", "chaos reach", "arc staff", "gathering storm", "fists of havoc", "thundercrash", "electricity"],
            stasis: ["slow", "freeze", "shatter", "stasis crystal", "stasis", "winter's wrath", "silence and squall", "glacial quake", "ice", "cold", "duskfield", "coldsnap"],
            strand: ["suspend", "unravel", "sever", "woven mail", "tangle", "strand", "needlestorm", "silkstrike", "bladefury", "thread", "threadling"],
            prismatic: ["prismatic", "transcendence", "facet", "ascension", "devotion", "hope"],
            neutral: ["melee", "grenade", "class ability", "precision", "finisher", "orb of power", "kinetic", "reload", "handling", "sprint", "slide", "airborne", "poison"]
        };

        const CLASS_TYPES = {
            0: "Titan",
            1: "Hunter",
            2: "Warlock"
        };
        
        const SUBCLASS_MAPPING = {
            "striker": "arc", "sentinel": "void", "sunbreaker": "solar", "behemoth": "stasis", "berserker": "strand", "prismatic titan": "prismatic",
            "arcstrider": "arc", "nightstalker": "void", "gunslinger": "solar", "revenant": "stasis", "threadrunner": "strand", "prismatic hunter": "prismatic",
            "stormcaller": "arc", "voidwalker": "void", "dawnblade": "solar", "shadebinder": "stasis", "broodweaver": "strand", "prismatic warlock": "prismatic"
        };

        function App() {
            const [status, setStatus] = React.useState("Initializing...");
            const [isReady, setIsReady] = React.useState(false);
            const [db, setDb] = React.useState({ weapons: [], armor: [], subclasses: [], abilities: {}, sets: [], abilityNames: new Set(), weaponTypes: new Set(), artifacts: [] });
            
            const [selClass, setSelClass] = React.useState("");
            const [selArmor, setSelArmor] = React.useState("");
            const [selWeapon, setSelWeapon] = React.useState("");
            const [selSubclass, setSelSubclass] = React.useState("");

            const [build, setBuild] = React.useState(null);
            
            // NEW: State for Share Modal and URL
            const [showShareModal, setShowShareModal] = React.useState(false);
            const [shareUrl, setShareUrl] = React.useState("");
            const [copied, setCopied] = React.useState(false);

            React.useEffect(() => {
                async function loadManifest() {
                    try {
                        setStatus("Connecting to Bungie Manifest...");
                        let itemDefUrl = "https://destiny.plumbing/en/raw/DestinyInventoryItemDefinition.json";
                        let setDefUrl = "https://destiny.plumbing/en/raw/DestinyEquipableItemSetDefinition.json";
                        let perkDefUrl = "https://destiny.plumbing/en/raw/DestinySandboxPerkDefinition.json";
                        let plugSetDefUrl = "https://destiny.plumbing/en/raw/DestinyPlugSetDefinition.json";
                        let seasonDefUrl = "https://destiny.plumbing/en/raw/DestinySeasonDefinition.json";
                        
                        try {
                            const res = await fetch("https://www.bungie.net/Platform/Destiny2/Manifest/", { mode: 'cors' });
                            if (res.ok) {
                                const data = await res.json();
                                itemDefUrl = "https://www.bungie.net" + data.Response.jsonWorldComponentContentPaths.en.DestinyInventoryItemDefinition;
                                setDefUrl = "https://www.bungie.net" + data.Response.jsonWorldComponentContentPaths.en.DestinyEquipableItemSetDefinition;
                                perkDefUrl = "https://www.bungie.net" + data.Response.jsonWorldComponentContentPaths.en.DestinySandboxPerkDefinition;
                                plugSetDefUrl = "https://www.bungie.net" + data.Response.jsonWorldComponentContentPaths.en.DestinyPlugSetDefinition;
                                seasonDefUrl = "https://www.bungie.net" + data.Response.jsonWorldComponentContentPaths.en.DestinySeasonDefinition;
                            }
                        } catch (e) {
                            console.warn("Bungie manifest endpoint failed, falling back to community mirror...");
                        }

                        setStatus("Downloading Databases (this may take a moment)...");
                        const [itemsRes, setsRes, perksRes, plugSetsRes, seasonsRes] = await Promise.all([
                            fetch(itemDefUrl, { mode: 'cors' }),
                            fetch(setDefUrl, { mode: 'cors' }),
                            fetch(perkDefUrl, { mode: 'cors' }),
                            fetch(plugSetDefUrl, { mode: 'cors' }),
                            fetch(seasonDefUrl, { mode: 'cors' })
                        ]);
                        
                        const itemsData = await itemsRes.json();
                        const setsData = await setsRes.json();
                        const perksData = await perksRes.json();
                        const plugSetsData = await plugSetsRes.json();
                        const seasonsData = await seasonsRes.json();

                        setStatus("Processing Items & Sockets...");
                        
                        const weaponsMap = new Map();
                        const armorMap = new Map();
                        const subclassesMap = new Map();
                        const abilitiesMaps = {
                            super: new Map(), melee: new Map(), grenade: new Map(), 
                            classAbility: new Map(), jump: new Map(), aspects: new Map(), fragments: new Map()
                        };
                        const legendaryArmor = [];
                        const globalAbilityNames = new Set();
                        const globalWeaponTypes = new Set();
                        
                        const exoticClassItems = ["stoicism", "relativism", "solipsism"];

                        const rawArtifacts = [];

                        const perfectClassItemPools = { 0: [[],[]], 1: [[],[]], 2: [[],[]] };
                        
                        // Exact mapping of the Destiny 2 Meta. This guarantees 100% correct class & column separation.
                        const TRAIT_MAP = {
                            0: { 0: ["assassin", "inmost light", "ophidian", "severance", "hoarfrost", "bear", "abeyant"], 1: ["star-eater", "synthoceps", "verity", "contact", "scars", "horn", "armamentarium", "lupi"] },
                            1: { 0: ["assassin", "inmost light", "ophidian", "galanor", "renewal", "foetracer", "caliban", "dragon"], 1: ["star-eater", "synthoceps", "verity", "cyrtarachne", "gyrfalcon", "liar", "coyote", "wormhusk"] },
                            2: { 0: ["assassin", "inmost light", "ophidian", "apotheosis", "osmiomancy", "necrotic", "filaments"], 1: ["star-eater", "synthoceps", "verity", "swarm", "vesper", "harmony", "starfire", "claw"] }
                        };

                        // Pass 1: Scrape Plugs globally (Preferred so DIM export hashes work)
                        for (const hash in itemsData) {
                            const item = itemsData[hash];
                            if (!item.displayProperties) continue;
                            let name = item.displayProperties.name || "";
                            let desc = item.displayProperties.description || "";
                            let icon = item.displayProperties.icon || "";
                            let isTrait = name.toLowerCase().includes("spirit of");

                            if (item.perks && item.perks.length > 0) {
                                const sbDef = perksData[item.perks[0].perkHash];
                                if (sbDef && sbDef.displayProperties?.name?.toLowerCase().includes("spirit of")) {
                                    isTrait = true;
                                    name = sbDef.displayProperties.name;
                                    desc = sbDef.displayProperties.description || desc;
                                    icon = sbDef.displayProperties.icon || icon;
                                }
                            }

                            if (isTrait && !name.toLowerCase().includes("empty") && !name.toLowerCase().includes("deprecated")) {
                                const nameLower = name.toLowerCase();
                                const perkObj = { hash, name, desc: desc || "No description available.", icon: icon ? `https://www.bungie.net${icon}` : "" };
                                
                                [0, 1, 2].forEach(cId => {
                                    [0, 1].forEach(colIdx => {
                                        if (TRAIT_MAP[cId][colIdx].some(t => nameLower.includes(t))) {
                                            const existing = perfectClassItemPools[cId][colIdx].findIndex(p => p.name === name);
                                            if (existing === -1) {
                                                perfectClassItemPools[cId][colIdx].push(perkObj);
                                            } else if (desc.length > perfectClassItemPools[cId][colIdx][existing].desc.length) {
                                                perfectClassItemPools[cId][colIdx][existing] = perkObj; // Keep the version with the best description
                                            }
                                        }
                                    });
                                });
                            }
                        }

                        // Pass 2: Scrape Sandbox Perks directly as a fallback to guarantee pools are full
                        for (const hash in perksData) {
                            const perk = perksData[hash];
                            let name = perk.displayProperties?.name || "";
                            let desc = perk.displayProperties?.description || "";
                            if (name.toLowerCase().includes("spirit of") && !name.toLowerCase().includes("empty") && !name.toLowerCase().includes("deprecated")) {
                                const nameLower = name.toLowerCase();
                                const perkObj = { hash, name, desc: desc || "No description available.", icon: perk.displayProperties?.icon ? `https://www.bungie.net${perk.displayProperties.icon}` : "" };
                                
                                [0, 1, 2].forEach(cId => {
                                    [0, 1].forEach(colIdx => {
                                        if (TRAIT_MAP[cId][colIdx].some(t => nameLower.includes(t))) {
                                            const existing = perfectClassItemPools[cId][colIdx].findIndex(p => p.name === name);
                                            if (existing === -1) {
                                                perfectClassItemPools[cId][colIdx].push(perkObj);
                                            }
                                        }
                                    });
                                });
                            }
                        }

                        for (const hash in itemsData) {
                            const item = itemsData[hash];
                            if (!item.displayProperties || !item.displayProperties.name) continue;
                            
                            const name = item.displayProperties.name;
                            const desc = item.displayProperties.description || "";
                            const dName = item.itemTypeDisplayName || "";
                            
                            const nameLower = name.toLowerCase();
                            const dNameLower = dName.toLowerCase();
                            const descLower = desc.toLowerCase();

                            // GLOBAL DEPRECATION & DUMMY CHECK
                            if (nameLower.includes("empty") || nameLower.includes("deprecated") || nameLower.includes("dummy")) continue;
                            if (descLower.includes("deprecated")) continue;
                            if (!item.displayProperties.icon) continue; 
                            
                            // Cache Valid Legendary Armor for Set Extraction Fallbacks
                            if (item.itemType === 2 && item.inventory?.tierType === 5) {
                                legendaryArmor.push({
                                    hash: hash,
                                    nameLower: nameLower,
                                    classType: item.classType,
                                    bucket: item.inventory.bucketTypeHash
                                });
                            }

                            // 1. Exotics
                            const isExoticWeapon = item.itemType === 3 && item.inventory?.tierType === 6;
                            const isExoticArmor = item.itemType === 2 && item.inventory?.tierType === 6;
                            const isExoticClassItem = isExoticArmor && exoticClassItems.some(n => nameLower.includes(n));
                            
                            if (isExoticWeapon || isExoticArmor) {
                                let actualPerkName = "";
                                let actualPerkDesc = "";
                                let perkColumns = [];
                                
                                if (isExoticClassItem) {
                                    // SPECIAL CASE: Force inject the perfectly mapped arrays!
                                    perkColumns = perfectClassItemPools[item.classType] || [[], []];
                                    actualPerkName = "Exotic Class Item";
                                    actualPerkDesc = "Rolls with two random Exotic perks.";
                                } else {
                                    // Standard Exotics: Bypass broken trait pools and grab the static intrinsic perk
                                    if (item.sockets && item.sockets.socketEntries) {
                                        for (let socket of item.sockets.socketEntries) {
                                            let plugHash = socket.singleInitialItemHash;
                                            if (plugHash && itemsData[plugHash]) {
                                                let plug = itemsData[plugHash];
                                                let pci = (plug.plug && plug.plug.plugCategoryIdentifier) || "";
                                                let typeName = plug.itemTypeDisplayName || "";
                                                
                                                if (!actualPerkName && (pci.includes("intrinsic") || pci.includes("exotic") || typeName.toLowerCase().includes("trait") || typeName.toLowerCase().includes("armor perk"))) {
                                                    if (plug.displayProperties && plug.displayProperties.description) {
                                                        actualPerkName = plug.displayProperties.name;
                                                        actualPerkDesc = plug.displayProperties.description;
                                                    }
                                                }
                                            }
                                        }
                                    }
                                }
                        
                                const finalDesc = actualPerkDesc || desc;
                                const finalPerkName = actualPerkName || "";
                                const itemIndex = item.index || 0;
                                const hasPerk = !!actualPerkName || perkColumns.length > 0;

                                let damageType = "kinetic";
                                let ammoType = "";
                                if (isExoticWeapon) {
                                    if (item.defaultDamageType === 2) damageType = "arc";
                                    else if (item.defaultDamageType === 3) damageType = "solar";
                                    else if (item.defaultDamageType === 4) damageType = "void";
                                    else if (item.defaultDamageType === 6) damageType = "stasis";
                                    else if (item.defaultDamageType === 7) damageType = "strand";
                                    
                                    if (item.equippingBlock) {
                                        if (item.equippingBlock.ammoType === 1) ammoType = "primary";
                                        else if (item.equippingBlock.ammoType === 2) ammoType = "special";
                                        else if (item.equippingBlock.ammoType === 3) ammoType = "heavy";
                                    }
                                }

                                let weaponType = dNameLower.replace('combat ', '');
                                if (isExoticWeapon && weaponType) globalWeaponTypes.add(weaponType);

                                const itemData = { 
                                    hash, name, icon: `https://www.bungie.net${item.displayProperties.icon}`, 
                                    desc: finalDesc, perkName: finalPerkName, classType: item.classType, 
                                    itemType: item.itemType, index: itemIndex, hasPerk,
                                    bucket: item.inventory?.bucketTypeHash,
                                    damageType, weaponType, ammoType, perkColumns
                                };

                                const targetMap = isExoticWeapon ? weaponsMap : armorMap;
                                const existing = targetMap.get(name);
                                
                                const totalPerks = perkColumns.reduce((acc, col) => acc + col.length, 0);
                                const existingTotalPerks = existing?.perkColumns?.reduce((acc, col) => acc + col.length, 0) || 0;
                                
                                // Strict deduplication: ALWAYS protect versions with full randomized perk pools from static dummy items
                                let shouldSave = false;
                                if (!existing) {
                                    shouldSave = true;
                                } else {
                                    if (totalPerks > existingTotalPerks) {
                                        shouldSave = true; 
                                    } else if (totalPerks === existingTotalPerks) {
                                        if (hasPerk && !existing.hasPerk) shouldSave = true;
                                        else if (hasPerk === existing.hasPerk && itemIndex > existing.index) shouldSave = true;
                                    }
                                }

                                if (shouldSave) {
                                    targetMap.set(name, itemData);
                                }
                                continue;
                            }

                            // 1.5 Artifacts
                            if (item.inventory && item.inventory.bucketTypeHash === 1506418338) {
                                rawArtifacts.push(item);
                            }

                            // 2. Subclasses (Prismatic Override logic mapped)
                            if (item.itemType === 16 && item.classType !== 3 && dName.includes("Subclass")) {
                                let subName = name.toLowerCase();
                                let determinedElement = "neutral";
                                for (const [key, el] of Object.entries(SUBCLASS_MAPPING)) {
                                    if (subName.includes(key)) {
                                        determinedElement = el;
                                        break;
                                    }
                                }

                                if (determinedElement !== "neutral" || subName.includes("prismatic")) {
                                    const subKey = `${name}-${item.classType}`;
                                    const itemIndex = item.index || 0;
                                    const existing = subclassesMap.get(subKey);
                                    
                                    const validPlugs = new Set();
                                    if (item.sockets && item.sockets.socketEntries) {
                                        for (const socket of item.sockets.socketEntries) {
                                            if (socket.singleInitialItemHash) validPlugs.add(String(socket.singleInitialItemHash));
                                            if (socket.reusablePlugItems) {
                                                socket.reusablePlugItems.forEach(p => validPlugs.add(String(p.plugItemHash)));
                                            }
                                            if (socket.reusablePlugSetHash && plugSetsData[socket.reusablePlugSetHash]) {
                                                const plugSet = plugSetsData[socket.reusablePlugSetHash];
                                                if (plugSet.reusablePlugItems) {
                                                    plugSet.reusablePlugItems.forEach(p => validPlugs.add(String(p.plugItemHash)));
                                                }
                                            }
                                            if (socket.randomizedPlugSetHash && plugSetsData[socket.randomizedPlugSetHash]) {
                                                const plugSet = plugSetsData[socket.randomizedPlugSetHash];
                                                if (plugSet.reusablePlugItems) {
                                                    plugSet.reusablePlugItems.forEach(p => validPlugs.add(String(p.plugItemHash)));
                                                }
                                            }
                                        }
                                    }

                                    if (!existing || itemIndex > existing.index) {
                                        subclassesMap.set(subKey, {
                                            hash: hash, name: name, icon: `https://www.bungie.net${item.displayProperties.icon}`,
                                            desc: desc, classType: item.classType, element: determinedElement, index: itemIndex,
                                            validPlugs: validPlugs
                                        });
                                    } else if (existing && validPlugs.size > 0) {
                                        validPlugs.forEach(p => existing.validPlugs.add(p));
                                    }
                                }
                            }

                            // 3. Abilities
                            if (item.plug && item.plug.plugCategoryIdentifier) {
                                const pci = item.plug.plugCategoryIdentifier.toLowerCase();

                                const pciBans = ['armor', 'weapon', 'masterwork', 'mod', 'catalyst', 'upgrade', 'ghost', 'ornament', 'shader', 'emote', 'sparrow', 'ship', 'tracker', 'memento', 'crafting', 'hologram', 'glow', 'kill_tracker', 'test', 'events', 'finishers'];
                                if (pciBans.some(term => pci.includes(term))) continue;

                                const dNameBans = ['launcher', 'ornament', 'mod', 'catalyst', 'masterwork', 'upgrade', 'shader', 'emote', 'ghost', 'sparrow', 'ship', 'dummy', 'finisher', 'weapon', 'armor'];
                                if (dNameBans.some(term => dNameLower.includes(term))) continue;

                                const transcendentGrenades = ['freezing singularity', 'hailfire spike', 'electrified snare'];
                                if (transcendentGrenades.some(term => nameLower.includes(term))) continue;

                                const jumpNames = ["strafe jump", "high jump", "triple jump", "blink", "strafe glide", "burst glide", "balanced glide", "catapult lift", "strafe lift", "high lift"];
                                const meleeNames = ["hammer strike", "throwing hammer", "shield bash", "shield throw", "seismic strike", "thunderclap", "shiver strike", "frenzied blade", "knife trick", "proximity explosive knife", "weighted heavy knife", "lightweight knife", "snare bomb", "combination blow", "disorienting blow", "withering blade", "threaded spike", "celestial fire", "incinerator snap", "pocket singularity", "ball lightning", "chain lightning", "penumbral blast", "arcane needle"];
                                const classAbilNames = ["phoenix dive", "acrobat's dodge", "thruster", "healing rift", "empowering rift", "marksman's dodge", "gambler's dodge", "towering barricade", "rally barricade"];
                                const superNames = ["well of radiance", "daybreak", "golden gun", "blade barrage", "hammer of sol", "burning maul", "nova bomb", "nova warp", "shadowshot", "spectral blades", "ward of dawn", "sentinel shield", "stormtrance", "chaos reach", "arc staff", "gathering storm", "fists of havoc", "thundercrash", "glacial quake", "silence and squall", "winter's wrath", "bladefury", "silkstrike", "needlestorm", "song of flame", "storm's edge", "twilight arsenal"];

                                let category = null;
                                if (pci.includes('super') || dNameLower.includes('super ability') || superNames.some(n => nameLower.includes(n))) category = 'super';
                                else if (pci.includes('melee') || dNameLower.includes('melee') || meleeNames.includes(nameLower)) category = 'melee';
                                else if (pci.includes('grenade') || dNameLower.includes('grenade')) category = 'grenade';
                                else if (pci.includes('class_ability') || pci.includes('dodge') || pci.includes('rift') || pci.includes('barricade') || pci.includes('thruster') || dNameLower.includes('class ability') || classAbilNames.includes(nameLower)) category = 'classAbility';
                                else if (pci.includes('movement') || pci.includes('jump') || dNameLower.includes('movement') || jumpNames.includes(nameLower)) category = 'jump';
                                else if (pci.includes('aspect') || dNameLower.includes('aspect')) category = 'aspects';
                                else if (pci.includes('fragment') || dNameLower.includes('fragment')) category = 'fragments';

                                if (category && name.length > 1) {
                                    globalAbilityNames.add(nameLower);
                                    
                                    let classConstraint = item.classType !== 3 ? item.classType : "shared";
                                    if (classConstraint === "shared") {
                                        if (pci.includes('titan') || dNameLower.includes('titan')) classConstraint = 0;
                                        else if (pci.includes('hunter') || dNameLower.includes('hunter')) classConstraint = 1;
                                        else if (pci.includes('warlock') || dNameLower.includes('warlock')) classConstraint = 2;
                                    }

                                    let elementConstraint = "neutral";
                                    
                                    if (pci.match(/\bsolar\b/)) elementConstraint = 'solar';
                                    else if (pci.match(/\bvoid\b/)) elementConstraint = 'void';
                                    else if (pci.match(/\barc\b/)) elementConstraint = 'arc';
                                    else if (pci.match(/\bstasis\b/)) elementConstraint = 'stasis';
                                    else if (pci.match(/\bstrand\b/)) elementConstraint = 'strand';
                                    else if (pci.match(/\bprismatic\b/) || dNameLower.includes('prismatic') || nameLower.includes('facet of')) elementConstraint = 'prismatic';
                                    else {
                                        if (/\bsolar\b/.test(nameLower) && !/\bphoenix dive\b/.test(nameLower) && !/\bacrobat's dodge\b/.test(nameLower)) elementConstraint = 'solar';
                                        else if (/\bvoid\b/.test(nameLower)) elementConstraint = 'void';
                                        else if (/\barc\b/.test(nameLower) && !/\barcane\b/.test(nameLower)) elementConstraint = 'arc';
                                        else if (/\bstasis\b/.test(nameLower)) elementConstraint = 'stasis';
                                        else if (/\bstrand\b/.test(nameLower)) elementConstraint = 'strand';
                                        else {
                                            const knownElements = {
                                                solar: ["hammer strike", "throwing hammer", "knife trick", "proximity explosive knife", "weighted heavy knife", "lightweight knife", "celestial fire", "incinerator snap", "phoenix dive", "acrobat's dodge", "well of radiance", "daybreak", "golden gun", "blade barrage", "hammer of sol", "burning maul", "consecration", "gunpowder gamble", "knock 'em down", "on your mark", "touch of flame", "heat rises", "icarus dash", "sol invictus", "roaring flames", "song of flame", "hellion"],
                                                void: ["shield bash", "shield throw", "snare bomb", "pocket singularity", "nova bomb", "nova warp", "shadowshot", "spectral blades", "ward of dawn", "sentinel shield", "bastion", "controlled demolition", "offensive bulwark", "vanishing step", "stylish executioner", "trapper's ambush", "chaos accelerant", "feed the void", "child of the old gods", "twilight arsenal", "unbreakable"],
                                                arc: ["seismic strike", "thunderclap", "combination blow", "disorienting blow", "ball lightning", "chain lightning", "thruster", "stormtrance", "chaos reach", "arc staff", "gathering storm", "fists of havoc", "thundercrash", "touch of thunder", "juggernaut", "knockout", "flow state", "lethal current", "tempest strike", "electrostatic mind", "lightning surge", "arc soul", "storm's edge", "ascension"],
                                                stasis: ["shiver strike", "withering blade", "penumbral blast", "glacial quake", "silence and squall", "winter's wrath", "cryoclasm", "howl of the storm", "tectonic harvest", "grim harvest", "shatterdive", "touch of winter", "iceflare bolts", "bleak watcher", "frostpulse", "diamond lance", "winter's shroud", "glacial harvest"],
                                                strand: ["frenzied blade", "threaded spike", "arcane needle", "bladefury", "silkstrike", "needlestorm", "into the fray", "drengr's lash", "banner of war", "ensnaring slam", "widow's silk", "threaded specter", "whirling maelstrom", "weaver's call", "mindspun invocation", "the wanderer", "weavewalk", "flechette storm"]
                                            };
                                            for (const [el, abilities] of Object.entries(knownElements)) {
                                                if (abilities.some(a => nameLower.includes(a))) {
                                                    elementConstraint = el;
                                                    break;
                                                }
                                            }
                                        }
                                    }

                                    // Special override for Blink, as it is the only element-locked Jump ability
                                    if (nameLower === "blink") {
                                        if (classConstraint === 2) elementConstraint = "void"; // Warlock
                                        else if (classConstraint === 1) elementConstraint = "arc"; // Hunter
                                    }

                                    if (['super', 'melee', 'grenade', 'classAbility', 'jump'].includes(category)) {
                                        if (KEYWORDS[elementConstraint] && !KEYWORDS[elementConstraint].includes(nameLower)) {
                                            KEYWORDS[elementConstraint].push(nameLower);
                                        }
                                    }

                                    let fragmentSlots = 0;
                                    if (category === 'aspects') {
                                        if (item.investmentStats) {
                                            const stat = item.investmentStats.find(s => s.statTypeHash === 2586071856);
                                            if (stat) fragmentSlots = stat.value;
                                            else {
                                                const fallback = item.investmentStats.find(s => s.value >= 1 && s.value <= 4);
                                                if (fallback) fragmentSlots = fallback.value;
                                            }
                                        }
                                        if (fragmentSlots === 0) fragmentSlots = 2; 
                                    }

                                    let abilDesc = desc;
                                    if (item.perks && item.perks.length > 0) {
                                        const perkHash = item.perks[0].perkHash;
                                        if (perkHash && perksData[perkHash] && perksData[perkHash].displayProperties && perksData[perkHash].displayProperties.description) {
                                            const perkDesc = perksData[perkHash].displayProperties.description;
                                            if (perkDesc.length > abilDesc.length) {
                                                abilDesc = perkDesc;
                                            }
                                        }
                                    }

                                    let statBonuses = [];
                                    if (category === 'fragments' && item.investmentStats) {
                                        item.investmentStats.forEach(stat => {
                                            if (stat.value !== 0) {
                                                let statName = "";
                                                if (stat.statTypeHash === 2996146975) statName = "Class";
                                                else if (stat.statTypeHash === 392767087) statName = "Health";
                                                else if (stat.statTypeHash === 1943323491) statName = "Health";
                                                else if (stat.statTypeHash === 1735777505) statName = "Grenade";
                                                else if (stat.statTypeHash === 144602215) statName = "Super";
                                                else if (stat.statTypeHash === 4244567218) statName = "Melee";
                                                
                                                if (statName) {
                                                    statBonuses.push(`${stat.value > 0 ? '+' : ''}${stat.value} ${statName}`);
                                                }
                                            }
                                        });
                                    }

                                    const itemIndex = item.index || 0;
                                    const abilKey = `${name}-${classConstraint}`;
                                    const targetMap = abilitiesMaps[category];
                                    const existingAbil = targetMap.get(abilKey);

                                    const abilData = { 
                                        hash, name, desc: abilDesc, icon: `https://www.bungie.net${item.displayProperties.icon}`, 
                                        pci, classConstraint, elementConstraint, fragmentSlots, index: itemIndex, stats: statBonuses 
                                    };

                                    if (!existingAbil) {
                                        targetMap.set(abilKey, abilData);
                                    } else {
                                        const isBetterDesc = abilDesc.length > (existingAbil.desc?.length || 0);
                                        if (category === 'aspects') {
                                            if (fragmentSlots > existingAbil.fragmentSlots || (fragmentSlots === existingAbil.fragmentSlots && isBetterDesc) || (fragmentSlots === existingAbil.fragmentSlots && !isBetterDesc && itemIndex > existingAbil.index)) {
                                                targetMap.set(abilKey, abilData);
                                            }
                                        } else {
                                            if (isBetterDesc || (abilDesc === existingAbil.desc && itemIndex > existingAbil.index)) {
                                                targetMap.set(abilKey, abilData);
                                            }
                                        }
                                    }
                                }
                            }
                        }

                        const weapons = Array.from(weaponsMap.values());
                        const armor = Array.from(armorMap.values());
                        const subclasses = Array.from(subclassesMap.values());
                        const allAbilities = {
                            super: Array.from(abilitiesMaps.super.values()),
                            melee: Array.from(abilitiesMaps.melee.values()),
                            grenade: Array.from(abilitiesMaps.grenade.values()),
                            classAbility: Array.from(abilitiesMaps.classAbility.values()),
                            jump: Array.from(abilitiesMaps.jump.values()),
                            aspects: Array.from(abilitiesMaps.aspects.values()),
                            fragments: Array.from(abilitiesMaps.fragments.values())
                        };

                        const parsedArtifacts = [];
                        
                        rawArtifacts.forEach(art => {
                            if (art.sockets && art.sockets.socketEntries && art.sockets.socketEntries.length > 0) {
                                let sNum = 0;
                                if (art.seasonHash && seasonsData[art.seasonHash]) {
                                    sNum = seasonsData[art.seasonHash].seasonNumber;
                                }

                                const artifactData = {
                                    hash: art.hash,
                                    name: art.displayProperties.name,
                                    icon: `https://www.bungie.net${art.displayProperties.icon}`,
                                    desc: art.displayProperties.description || "",
                                    seasonNumber: sNum,
                                    columns: []
                                };
                                
                                const seenPerkHashes = new Set();

                                art.sockets.socketEntries.forEach(socket => {
                                    if (socket.reusablePlugSetHash && plugSetsData[socket.reusablePlugSetHash]) {
                                        const plugSet = plugSetsData[socket.reusablePlugSetHash];
                                        const columnPerks = [];
                                        
                                        if (plugSet.reusablePlugItems) {
                                            plugSet.reusablePlugItems.forEach(plugItem => {
                                                const pHash = plugItem.plugItemHash;
                                                if (!seenPerkHashes.has(pHash) && itemsData[pHash]) {
                                                    seenPerkHashes.add(pHash);
                                                    const pItem = itemsData[pHash];
                                                    
                                                    if (pItem.displayProperties && pItem.displayProperties.name) {
                                                        const pNameLower = pItem.displayProperties.name.toLowerCase();
                                                        if (pNameLower.includes("reset") || pNameLower.includes("empty") || pNameLower.includes("deprecated")) return; // Filter out dummy, empty, and deprecated nodes
                                                        
                                                        let pDesc = pItem.displayProperties.description || "";
                                                        if (pItem.perks && pItem.perks.length > 0) {
                                                            const sandboxHash = pItem.perks[0].perkHash;
                                                            if (sandboxHash && perksData[sandboxHash] && perksData[sandboxHash].displayProperties) {
                                                                pDesc = perksData[sandboxHash].displayProperties.description || pDesc;
                                                            }
                                                        }
                                                        columnPerks.push({
                                                            hash: String(pHash),
                                                            name: pItem.displayProperties.name,
                                                            icon: `https://www.bungie.net${pItem.displayProperties.icon}`,
                                                            desc: pDesc
                                                        });
                                                    }
                                                }
                                            });
                                        }
                                        
                                        if (columnPerks.length > 0) {
                                            artifactData.columns.push(columnPerks);
                                        }
                                    }
                                });

                                if (artifactData.columns.length > 0) {
                                    parsedArtifacts.push(artifactData);
                                }
                            }
                        });

                        const parsedSetsList = [];
                        for (const hash in setsData) {
                            const setDef = setsData[hash];
                            const setPerksList = setDef.setPerks || setDef.setBlock?.setPerks || [];
                            
                            if (setPerksList.length > 0) {
                                const parsedSetPerks = [];
                                let has2 = false, has4 = false;

                                setPerksList.forEach(sp => {
                                    const count = sp.requiredSetCount || sp.requiredEquippedItemCount || sp.itemCount || sp.count || sp.equipCount;
                                    if (count === 2 || count === 4) {
                                        const perkHash = sp.sandboxPerkHash || sp.perkHash;
                                        const perk = perksData[perkHash];
                                        if (perk && perk.displayProperties && perk.displayProperties.description) {
                                            parsedSetPerks.push({
                                                count: count,
                                                name: perk.displayProperties.name,
                                                description: perk.displayProperties.description
                                            });
                                            if (count === 2) has2 = true;
                                            if (count === 4) has4 = true;
                                        }
                                    }
                                });

                                const setArmor = { 0: [], 1: [], 2: [] };
                                if (setDef.itemList) {
                                    setDef.itemList.forEach(entry => {
                                        const itemHash = entry.itemHash || entry; 
                                        const item = itemsData[itemHash];
                                        if (item && item.itemType === 2 && item.inventory) {
                                            const cType = item.classType;
                                            if (cType >= 0 && cType <= 2) {
                                                setArmor[cType].push({
                                                    hash: itemHash,
                                                    bucket: item.inventory.bucketTypeHash
                                                });
                                            }
                                        }
                                    });
                                }

                                // FALLBACK: If Bungie forgot to populate itemList (frequent bug in modern seasons), use a heuristic based on cached legendary armor
                                const setNamePrefix = (setDef.displayProperties?.name || "").toLowerCase()
                                    .replace(/\b(set|armor|suit|gear|vestments|plate)\b/gi, "")
                                    .trim();
                                
                                if (setNamePrefix.length > 3) {
                                    for (let i = 0; i < 3; i++) {
                                        if (setArmor[i].length < 5) {
                                            const existingBuckets = new Set(setArmor[i].map(a => a.bucket));
                                            const matchingLegendaries = legendaryArmor.filter(a => a.classType === i && a.nameLower.includes(setNamePrefix));
                                            
                                            for (const leg of matchingLegendaries) {
                                                if (!existingBuckets.has(leg.bucket)) {
                                                    setArmor[i].push({ hash: leg.hash, bucket: leg.bucket });
                                                    existingBuckets.add(leg.bucket);
                                                }
                                            }
                                        }
                                    }
                                }

                                const totalArmorPieces = setArmor[0].length + setArmor[1].length + setArmor[2].length;

                                if (parsedSetPerks.length > 0 && totalArmorPieces > 0) {
                                    parsedSetsList.push({
                                        hash: hash,
                                        name: setDef.displayProperties?.name || "Unknown Set",
                                        perks: parsedSetPerks,
                                        has2,
                                        has4,
                                        synergyText: parsedSetPerks.map(p => p.description.toLowerCase()).join(" "),
                                        setArmor: setArmor
                                    });
                                }
                            }
                        }

                        setDb({ weapons, armor, subclasses, abilities: allAbilities, sets: parsedSetsList, abilityNames: globalAbilityNames, weaponTypes: globalWeaponTypes, artifacts: parsedArtifacts });
                        setIsReady(true);
                    } catch (err) {
                        setStatus("Error loading manifest. " + err.message);
                    }
                }

                loadManifest();
            }, []);

            // NEW: Hydrate build from URL parameters
            React.useEffect(() => {
                if (!isReady || build !== null) return;
                
                const params = new URLSearchParams(window.location.search);
                const loadoutParam = params.get('loadout');
                
                if (loadoutParam) {
                    try {
                        let lData;
                        try {
                            // Try decoding as Base64 first (New compressed share link format)
                            // (escape/unescape handles safe UTF-8 decoding)
                            lData = JSON.parse(decodeURIComponent(escape(atob(loadoutParam))));
                        } catch (e) {
                            // Fallback to plain URL decode for backward compatibility with older links
                            lData = JSON.parse(decodeURIComponent(loadoutParam));
                        }
                        const classStr = CLASS_TYPES[lData.classType] || "Titan";
                        
                        // Reconstruct Armor
                        const armorHash = lData.parameters?.exoticArmorHash;
                        const chosenArmor = armorHash ? db.armor.find(a => String(a.hash) === String(armorHash)) : null;
                        
                        // Reconstruct Weapon and Subclass
                        let chosenWeapon = null;
                        let chosenSubclass = null;
                        let socketOverrides = {};
                        
                        lData.equipped.forEach(eq => {
                            const hashStr = String(eq.hash);
                            if (db.weapons.some(w => w.hash === hashStr)) chosenWeapon = db.weapons.find(w => w.hash === hashStr);
                            else if (db.subclasses.some(s => s.hash === hashStr)) {
                                chosenSubclass = db.subclasses.find(s => s.hash === hashStr);
                                socketOverrides = eq.socketOverrides || {};
                            }
                        });

                        // Reconstruct Abilities
                        const getAbil = (cat, hash) => hash ? db.abilities[cat]?.find(a => a.hash === String(hash)) || null : null;
                        const superAbil = getAbil('super', socketOverrides["0"]);
                        const classAbil = getAbil('classAbility', socketOverrides["1"]);
                        const jump = getAbil('jump', socketOverrides["2"]);
                        const melee = getAbil('melee', socketOverrides["3"]);
                        const grenade = getAbil('grenade', socketOverrides["4"]);
                        
                        const aspects = [];
                        if (socketOverrides["5"]) aspects.push(getAbil('aspects', socketOverrides["5"]));
                        if (socketOverrides["6"]) aspects.push(getAbil('aspects', socketOverrides["6"]));
                        
                        const fragments = [];
                        for(let i = 7; i <= 11; i++) {
                            if (socketOverrides[String(i)]) fragments.push(getAbil('fragments', socketOverrides[String(i)]));
                        }
                        
                        const fragmentCapacity = aspects.reduce((sum, a) => sum + (a ? (a.fragmentSlots || 0) : 0), 0);

                        // Reconstruct Artifact
                        const artifactPerks = [];
                        let bestArtifact = null;
                        const unlockedHashes = lData.parameters?.artifactUnlocks?.unlockedItemHashes || [];
                        
                        if (unlockedHashes.length > 0 && db.artifacts.length > 0) {
                            db.artifacts.forEach(art => {
                                let matchCount = 0;
                                art.columns.forEach(col => col.forEach(p => { if (unlockedHashes.includes(Number(p.hash))) matchCount++; }));
                                if (matchCount > 0 && (!bestArtifact || matchCount > bestArtifact.matchCount)) {
                                    bestArtifact = art;
                                    bestArtifact.matchCount = matchCount;
                                }
                            });
                            if (bestArtifact) {
                                bestArtifact.columns.forEach(col => col.forEach(p => {
                                    if (unlockedHashes.includes(Number(p.hash))) artifactPerks.push(p);
                                }));
                            }
                        }

                        // Reconstruct Set Bonuses
                        const actualSetBonuses = [];
                        if (lData.parameters?.setBonuses) {
                            Object.entries(lData.parameters.setBonuses).forEach(([sHash, count]) => {
                                const setDef = db.sets.find(s => s.hash === String(sHash));
                                if (setDef) {
                                    setDef.perks.forEach(p => {
                                        if (p.count <= count) {
                                            actualSetBonuses.push({ setName: setDef.name, perk: p, setDef });
                                        }
                                    });
                                }
                            });
                        }

                        // Reconstruct Custom Builder Data (Stats, Elemental lock, Traits)
                        let stats = { primary: "Health", secondary: "Class" };
                        let armorPerks = [];
                        let element = chosenSubclass?.element || "neutral";

                        const bData = lData.parameters?.builderData;
                        if (bData) {
                            if (bData.stats) stats = bData.stats;
                            if (bData.element) element = bData.element;
                            if (bData.armorPerks && bData.armorPerks.length > 0 && chosenArmor && chosenArmor.perkColumns) {
                                bData.armorPerks.forEach(pH => {
                                    chosenArmor.perkColumns.forEach(col => {
                                        const matched = col.find(p => p.hash === String(pH));
                                        if (matched && !armorPerks.some(ep => ep.hash === matched.hash)) armorPerks.push(matched);
                                    });
                                });
                            }
                        }

                        setBuild({
                            class: classStr, element, armor: chosenArmor, armorPerks, weapon: chosenWeapon,
                            subclass: chosenSubclass, actualSetBonuses, artifact: bestArtifact, artifactPerks, stats,
                            abilities: { superAbil, grenade, melee, classAbil, jump, aspects: aspects.filter(Boolean), fragments: fragments.filter(Boolean), fragmentCapacity }
                        });
                        
                        // Clear the URL parameter so refreshing doesn't lock them into the shared build
                        window.history.replaceState({}, document.title, window.location.pathname);
                        
                    } catch (e) {
                        console.error("Error parsing loadout URL", e);
                    }
                }
            }, [isReady, db, build]);

            const generateBuild = () => {
                if (!isReady) return;
                
                // Helper for Top-N weighted variance pool
                const pickFromScoredList = (scoredList, topN = 3) => {
                    if (scoredList.length === 0) return null;
                    
                    // Add random jitter to shuffle exact ties
                    scoredList.forEach(i => i._rand = Math.random());
                    
                    // Sort descending by score, then randomly if tied
                    scoredList.sort((a, b) => {
                        if (b.score === a.score) return b._rand - a._rand;
                        return b.score - a.score;
                    });
                    
                    // 1. Hard Override Constraint: If something is fundamentally required (+1000), bypass the pool and pick it
                    if (scoredList[0].score >= 1000) {
                        const required = scoredList.filter(i => i.score >= 1000);
                        return required[Math.floor(Math.random() * required.length)].item;
                    }

                    // 2. Build the Top N Pool
                    const topScore = scoredList[0].score;
                    // Safety check: Filter out options that score terribly compared to the leader (e.g. less than 40% of the top score)
                    // This prevents completely dead synergies from sneaking into the random pool
                    let validList = scoredList.filter(i => i.score >= topScore * 0.4); 
                    
                    let poolSize = Math.min(topN, validList.length);
                    const topPool = validList.slice(0, poolSize);
                    
                    // 3. Randomly select from the elite Top N pool
                    return topPool[Math.floor(Math.random() * topPool.length)].item;
                };

                // 1. Determine Class & Armor
                let finalClass = selClass !== "" ? parseInt(selClass) : Math.floor(Math.random() * 3);
                let chosenArmor;
                
                const exoticClassItems = ["stoicism", "relativism", "solipsism"];
                
                if (selArmor) {
                    chosenArmor = db.armor.find(a => a.hash === selArmor);
                    finalClass = chosenArmor.classType; 
                } else {
                    let availableArmor = db.armor.filter(a => a.classType === finalClass);
                    
                    if (selWeapon) {
                        const preSelWep = db.weapons.find(w => w.hash === selWeapon);
                        if (preSelWep && preSelWep.damageType) {
                            const filteredArmor = availableArmor.filter(a => {
                                const aText = (a.name + " " + a.desc + " " + (a.perkName || "")).replace(/[-]/g, ' ').toLowerCase();
                                let reqElements = [];
                                ['kinetic', 'solar', 'void', 'arc', 'stasis', 'strand'].forEach(el => {
                                    if (new RegExp('\\b' + el + '\\b(?:\\s+and\\s+\\w+)?\\s+(?:damage\\s+)?(?:weapons?|final blows?|kills?)', 'i').test(aText)) {
                                        reqElements.push(el);
                                    }
                                });
                                return reqElements.length === 0 || reqElements.includes(preSelWep.damageType);
                            });
                            if (filteredArmor.length > 0) availableArmor = filteredArmor;
                        }
                    }

                    if (selSubclass) {
                        const preSub = db.subclasses.find(s => s.hash === selSubclass);
                        if (preSub && preSub.element !== 'prismatic') {
                            availableArmor = availableArmor.filter(a => !exoticClassItems.some(n => a.name.toLowerCase().includes(n)));
                        }
                    }

                    chosenArmor = availableArmor[Math.floor(Math.random() * availableArmor.length)];
                }
                
                // NEW: Exotic Class Item Perk Evaluation
                let chosenArmorPerks = [];
                if (chosenArmor && exoticClassItems.some(n => chosenArmor.name.toLowerCase().includes(n)) && chosenArmor.perkColumns && chosenArmor.perkColumns.length >= 1) {
                    const scoreCol = (col) => {
                        if (!col || col.length === 0) return null;
                        let scored = col.map(perk => {
                            let score = 0;
                            let text = (perk.name + " " + perk.desc).toLowerCase().replace(/[-]/g, ' ');
                            if (selWeapon) {
                                 const preSelWep = db.weapons.find(w => w.hash === selWeapon);
                                 if (preSelWep && text.includes(preSelWep.damageType)) score += 50;
                            }
                            if (selSubclass) {
                                 const preSub = db.subclasses.find(s => s.hash === selSubclass);
                                 if (preSub && preSub.element !== 'neutral' && preSub.element !== 'prismatic' && text.includes(preSub.element)) score += 50;
                            }
                            return { item: perk, score };
                        });
                        return pickFromScoredList(scored, 3) || col[Math.floor(Math.random() * col.length)];
                    };

                    let p1 = scoreCol(chosenArmor.perkColumns[0]);
                    let p2 = chosenArmor.perkColumns.length > 1 ? scoreCol(chosenArmor.perkColumns[1]) : null;
                    
                    // Safety check to ensure we don't pick the exact same perk twice if Bungie combined the pools
                    if (p1 && p2 && p1.hash === p2.hash && chosenArmor.perkColumns[1].length > 1) {
                        const filteredCol2 = chosenArmor.perkColumns[1].filter(p => p.hash !== p1.hash);
                        p2 = scoreCol(filteredCol2);
                    }

                    chosenArmorPerks = [p1, p2].filter(Boolean); // Safely bundle and drop any nulls
                }

                // Combine the armor's base text with BOTH Exotic Class Item traits (if present)
                // This ensures the two randomly chosen traits act as the authoritative "seed" for the entire keyword engine.
                const armorText = (chosenArmor.name + " " + chosenArmor.desc + " " + (chosenArmor.perkName || "") + " " + chosenArmorPerks.map(p => p.name + " " + p.desc).join(" ")).toLowerCase();
                const armorFullText = armorText.replace(/[-]/g, ' ');

                // CASCADE SYNERGY ENGINE - Armor Authoritative Update
                const activeKeywords = new Set();
                const armorElements = new Set(); // Tracks the implicit elements demanded by the Exotic Armor

                const addKeywords = (text, isArmor = false) => {
                    const lowerText = text.replace(/[-]/g, ' ').toLowerCase();
                    Object.entries(KEYWORDS).forEach(([el, words]) => {
                        words.forEach(word => {
                            const safeWord = word.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                            if (new RegExp('\\b' + safeWord + '\\b', 'i').test(lowerText)) {
                                activeKeywords.add(word);
                                // If this keyword belongs to an element, inject the parent element
                                if (['solar', 'void', 'arc', 'stasis', 'strand', 'prismatic'].includes(el)) {
                                    activeKeywords.add(el);
                                    if (isArmor) armorElements.add(el); // Armor dictates the build's core
                                }
                            }
                        });
                    });

                    if (db.weaponTypes) {
                        db.weaponTypes.forEach(wt => {
                            const safeWord = wt.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                            if (new RegExp('\\b' + safeWord + 's?\\b', 'i').test(lowerText)) {
                                activeKeywords.add(wt);
                            }
                        });
                    }
                };

                const getKeywordWeight = (kw) => {
                    if (db.abilityNames && db.abilityNames.has(kw)) return 10;
                    if (db.weaponTypes && db.weaponTypes.has(kw)) return 5;
                    if (['solar', 'void', 'arc', 'stasis', 'strand', 'prismatic', 'kinetic', 'neutral', 'primary', 'special', 'heavy'].includes(kw)) return 5;
                    return 2;
                };
                
                // 1. Initialize with Armor Keywords (Authoritative)
                addKeywords(armorFullText, true);

                let requiredWeaponElements = [];
                ['kinetic', 'solar', 'void', 'arc', 'stasis', 'strand'].forEach(el => {
                    if (new RegExp('\\b' + el + '\\b(?:\\s+and\\s+\\w+)?\\s+(?:damage\\s+)?(?:weapons?|final blows?|kills?)', 'i').test(armorFullText)) {
                        requiredWeaponElements.push(el);
                    }
                });

                let targetElement = null;
                if (selSubclass) {
                    const preSub = db.subclasses.find(s => s.hash === selSubclass);
                    if (preSub && preSub.element !== 'neutral' && preSub.element !== 'prismatic') targetElement = preSub.element;
                }

                // NEW: Precision Requirements Tracking
                const precisionRegex = /\bprecision\b\s+(?:hits?|kills?|final blows?|damage)\b/i;
                const nonPrecisionTypes = ['grenade launcher', 'rocket launcher', 'sword', 'glaive', 'fusion rifle'];
                const armorNeedsPrecision = precisionRegex.test(armorFullText);

                // 2. Select Weapon based on synergy (Using Top-N Pool)
                let chosenWeapon;
                if (selWeapon) {
                    chosenWeapon = db.weapons.find(w => w.hash === selWeapon);
                } else {
                    let weaponPool = db.weapons;
                    if (requiredWeaponElements.length > 0) {
                        const filteredPool = weaponPool.filter(w => requiredWeaponElements.includes(w.damageType));
                        if (filteredPool.length > 0) weaponPool = filteredPool;
                    }

                    let scoredWeapons = weaponPool.map(weapon => {
                        const wText = (weapon.name + " " + (weapon.weaponType || "") + " " + weapon.desc + " " + (weapon.perkName || "")).replace(/[-]/g, ' ').toLowerCase();
                        let score = 0;
                        
                        activeKeywords.forEach(kw => {
                            const safeKw = kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                            if (new RegExp('\\b' + safeKw + '\\b', 'i').test(wText)) score += getKeywordWeight(kw);
                        });
                        
                        // Elemental Weighting
                        if (requiredWeaponElements.includes(weapon.damageType)) {
                            score += 1000; // Hard override for explicitly required elements
                        } else if (targetElement && weapon.damageType === targetElement) {
                            score += 20; 
                        } else if (armorElements.has(weapon.damageType)) {
                            score += 15; // Strongly favor weapons matching the implicit element of the armor
                        }
                        
                        // NEW: Precision Ban
                        // If the armor requires precision hits, ban weapons that can't crit
                        if (armorNeedsPrecision && nonPrecisionTypes.includes(weapon.weaponType)) {
                            score -= 2000;
                        }

                        return { item: weapon, score };
                    });
                    
                    // Choose randomly from the top 4 scoring weapons to introduce variance
                    chosenWeapon = pickFromScoredList(scoredWeapons, 4) || weaponPool[Math.floor(Math.random() * weaponPool.length)];
                }

                const weaponText = (chosenWeapon.name + " " + (chosenWeapon.weaponType || "") + " " + chosenWeapon.desc + " " + (chosenWeapon.perkName || "")).toLowerCase();
                addKeywords(weaponText, false);
                
                if (chosenWeapon.ammoType) {
                    activeKeywords.add(chosenWeapon.ammoType);
                }
                
                // 3. Select Subclass
                let chosenSubclass;
                let dominantElement = "neutral";
                
                const isExoticClassItem = chosenArmor && exoticClassItems.some(n => chosenArmor.name.toLowerCase().includes(n));
                
                // Strict Exotic Armor Ability Overrides (50/50 Prismatic Lock)
                let forcedSubclasses = [];
                if (chosenArmor && !isExoticClassItem) {
                    ['super', 'melee', 'grenade', 'classAbility', 'jump'].forEach(cat => {
                        if (db.abilities[cat]) {
                            db.abilities[cat].forEach(a => {
                                const aName = a.name.toLowerCase();
                                // Ensure ability name is substantial enough to avoid false positive generic words
                                // We add (?:s)? to handle pluralized abilities in descriptions (e.g. "Coldsnap grenades")
                                if (aName.length > 4 && new RegExp('\\b' + aName.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '(?:s)?\\b', 'i').test(armorFullText)) {
                                    let el = a.elementConstraint;
                                    if (el !== 'neutral' && el !== 'prismatic') {
                                        let subclassPool = db.subclasses.filter(s => s.classType === finalClass);
                                        let nativeSub = subclassPool.find(s => s.element === el);
                                        let prismSub = subclassPool.find(s => s.element === 'prismatic');
                                        
                                        if (nativeSub && !forcedSubclasses.includes(nativeSub)) forcedSubclasses.push(nativeSub);
                                        // If Prismatic actually has this exact ability in its kit, it joins the 50/50 pool
                                        if (prismSub && prismSub.validPlugs && prismSub.validPlugs.has(String(a.hash)) && !forcedSubclasses.includes(prismSub)) {
                                            forcedSubclasses.push(prismSub);
                                        }
                                    }
                                }
                            });
                        }
                    });

                    // NEW: Elemental Super Overrides (e.g., "Void Super")
                    ['solar', 'void', 'arc', 'stasis', 'strand'].forEach(el => {
                        if (new RegExp('\\b' + el + '\\s+super\\b', 'i').test(armorFullText)) {
                            let subclassPool = db.subclasses.filter(s => s.classType === finalClass);
                            let nativeSub = subclassPool.find(s => s.element === el);
                            let prismSub = subclassPool.find(s => s.element === 'prismatic');
                            
                            if (nativeSub && !forcedSubclasses.includes(nativeSub)) forcedSubclasses.push(nativeSub);
                            
                            // Only add Prismatic if it actually has a super of this element
                            if (prismSub && db.abilities.super) {
                                const hasMatchingPrismSuper = db.abilities.super.some(a => 
                                    a.elementConstraint === el && 
                                    prismSub.validPlugs && 
                                    prismSub.validPlugs.has(String(a.hash))
                                );
                                if (hasMatchingPrismSuper && !forcedSubclasses.includes(prismSub)) {
                                    forcedSubclasses.push(prismSub);
                                }
                            }
                        }
                    });
                    
                    // SPECIAL CASE: Getaway Artist implicitly requires Arc/Prismatic subclasses to have an Arc grenade
                    if (chosenArmor.name.toLowerCase().includes("getaway artist")) {
                        let subclassPool = db.subclasses.filter(s => s.classType === finalClass);
                        let arcSub = subclassPool.find(s => s.element === 'arc');
                        let prismSub = subclassPool.find(s => s.element === 'prismatic');
                        if (arcSub && !forcedSubclasses.includes(arcSub)) forcedSubclasses.push(arcSub);
                        if (prismSub && !forcedSubclasses.includes(prismSub)) forcedSubclasses.push(prismSub);
                    }
                }

                if (selSubclass) {
                    chosenSubclass = db.subclasses.find(s => s.hash === selSubclass);
                    if (isExoticClassItem && chosenSubclass && chosenSubclass.element !== 'prismatic') {
                        chosenSubclass = null; 
                    }
                } 
                
                if (!chosenSubclass) {
                    let subclassPool = db.subclasses.filter(s => s.classType === finalClass);
                    
                    if (isExoticClassItem) {
                        subclassPool = subclassPool.filter(s => s.element === 'prismatic');
                        chosenSubclass = subclassPool[Math.floor(Math.random() * subclassPool.length)];
                    } else if (forcedSubclasses.length > 0) {
                        // Strict 50/50 lock-in dictated by Exotic Armor
                        chosenSubclass = forcedSubclasses[Math.floor(Math.random() * forcedSubclasses.length)];
                    } else {
                        let scoredSubclasses = subclassPool.map(sub => {
                            let score = 0;
                            
                            const evaluateElementSynergy = (el) => {
                                let elScore = 0;
                                if (armorElements.has(el)) elScore += 200;
                                if (requiredWeaponElements.length > 0 && requiredWeaponElements.includes(el)) elScore += 50;
                                if (chosenWeapon && chosenWeapon.damageType !== 'kinetic' && chosenWeapon.damageType === el) elScore += 20;
                                if (activeKeywords.has(el)) elScore += 30;
                                
                                if (chosenWeapon && KEYWORDS[el]) {
                                    let weaponKeywordHits = 0;
                                    KEYWORDS[el].forEach(kw => {
                                        const safeKw = kw.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
                                        if (new RegExp('\\b' + safeKw + '\\b', 'i').test(weaponText)) {
                                            weaponKeywordHits++;
                                        }
                                    });
                                    if (weaponKeywordHits > 0) {
                                        if (armorElements.has(el) || armorElements.has('prismatic')) {
                                            elScore += weaponKeywordHits * 100;
                                        } else {
                                            elScore += weaponKeywordHits * 25;
                                        }
