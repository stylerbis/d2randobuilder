<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Destiny 2 Build Generator</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for in-browser JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="root"></div>

    <!-- Application Logic -->
    <script src="js/constants.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/manifest.js"></script>
    <script src="js/generator.js"></script>

    <script type="text/babel">
        function App() {
            const [status, setStatus] = React.useState("Initializing...");
            const [isReady, setIsReady] = React.useState(false);
            const [db, setDb] = React.useState({ weapons: [], armor: [], subclasses: [], abilities: {}, sets: [], abilityNames: new Set(), weaponTypes: new Set(), artifacts: [] });
            
            const [selClass, setSelClass] = React.useState("");
            const [selArmor, setSelArmor] = React.useState("");
            const [selWeapon, setSelWeapon] = React.useState("");
            const [selSubclass, setSelSubclass] = React.useState("");
            const [selArtifact, setSelArtifact] = React.useState("");

            const [build, setBuild] = React.useState(null);
            
            const [showShareModal, setShowShareModal] = React.useState(false);
            const [shareUrl, setShareUrl] = React.useState("");
            const [copied, setCopied] = React.useState(false);

            React.useEffect(() => {
                async function init() {
                    try {
                        const manifestData = await loadManifest(setStatus);
                        setDb(manifestData);
                        setIsReady(true);
                    } catch (err) {
                        setStatus(err.message);
                    }
                }

                init();
            }, []);

            React.useEffect(() => {
                if (!isReady || build !== null) return;
                
                const params = new URLSearchParams(window.location.search);
                const loadoutParam = params.get('loadout');
                
                if (loadoutParam) {
                    try {
                        let lData;
                        try {
                            lData = JSON.parse(decodeURIComponent(escape(atob(loadoutParam))));
                        } catch (e) {
                            lData = JSON.parse(decodeURIComponent(loadoutParam));
                        }
                        const classStr = CLASS_TYPES[lData.classType] || "Titan";
                        
                        const armorHash = lData.exoticArmorHash || lData.parameters?.exoticArmorHash;
                        const chosenArmor = armorHash ? db.armor.find(a => String(a.hash) === String(armorHash)) : null;
                        
                        let chosenWeapon = null;
                        let chosenSubclass = null;
                        let socketOverrides = {};
                        
                        lData.equipped.forEach(eq => {
                            const hashStr = String(eq.hash);
                            if (db.weapons.some(w => w.hash === hashStr)) chosenWeapon = db.weapons.find(w => w.hash === hashStr);
                            else if (db.subclasses.some(s => s.hash === hashStr)) {
                                chosenSubclass = db.subclasses.find(s => s.hash === hashStr);
                                socketOverrides = eq.socketOverrides || {};
                            }
                        });

                        const getAbil = (cat, hashStr) => hashStr ? db.abilities[cat]?.find(a => a.hashes.has(String(hashStr))) || null : null;
                        
                        let superAbil = null, classAbil = null, jump = null, melee = null, grenade = null;
                        let aspects = [], fragments = [];

                        if (chosenSubclass && chosenSubclass.socketCategoryMap) {
                            const findBySockets = (cat) => {
                                return (chosenSubclass.socketCategoryMap[cat] || [])
                                    .map(sIdx => getAbil(cat, String(socketOverrides[String(sIdx)])))
                                    .filter(Boolean);
                            };
                            superAbil = findBySockets('super')[0] || null;
                            classAbil = findBySockets('classAbility')[0] || null;
                            jump = findBySockets('jump')[0] || null;
                            melee = findBySockets('melee')[0] || null;
                            grenade = findBySockets('grenade')[0] || null;
                            aspects = findBySockets('aspects');
                            fragments = findBySockets('fragments');
                        } else {
                            superAbil = getAbil('super', socketOverrides["0"]);
                            classAbil = getAbil('classAbility', socketOverrides["1"]);
                            jump = getAbil('jump', socketOverrides["2"]);
                            melee = getAbil('melee', socketOverrides["3"]);
                            grenade = getAbil('grenade', socketOverrides["4"]);
                            aspects = [getAbil('aspects', socketOverrides["5"]), getAbil('aspects', socketOverrides["6"])];
                            fragments = [
                                getAbil('fragments', socketOverrides["7"]), getAbil('fragments', socketOverrides["8"]),
                                getAbil('fragments', socketOverrides["9"]), getAbil('fragments', socketOverrides["10"]),
                                getAbil('fragments', socketOverrides["11"]), getAbil('fragments', socketOverrides["12"])
                            ];
                        }

                        let fragmentCapacity = aspects.reduce((acc, a) => acc + (a ? a.fragmentSlots : 0), 0);

                        let bestArtifact = null;
                        const artifactPerks = []; 
                        const equippedArtifactObj = lData.equipped.find(eq => db.artifacts.some(a => a.hash === String(eq.hash)));
                        
                        if (equippedArtifactObj) {
                            bestArtifact = db.artifacts.find(a => a.hash === String(equippedArtifactObj.hash));
                            const unlocksObj = lData.artifactUnlocks || lData.parameters?.artifactUnlocks;

                            if (bestArtifact && unlocksObj && unlocksObj.unlockedItemHashes) {
                                unlocksObj.unlockedItemHashes.forEach(pHash => {
                                    const sData = bestArtifact.sockets.find(s => s.pool.some(p => p.hash === String(pHash)));
                                    if (sData) {
                                        const perk = sData.pool.find(p => p.hash === String(pHash));
                                        if (perk) artifactPerks.push({ socketIndex: sData.socketIndex, perk });
                                    }
                                });
                            } else if (bestArtifact && equippedArtifactObj.socketOverrides) {
                                Object.entries(equippedArtifactObj.socketOverrides).forEach(([sIdx, pHash]) => {
                                    const sData = bestArtifact.sockets.find(s => String(s.socketIndex) === sIdx);
                                    if (sData) {
                                        const perk = sData.pool.find(p => p.hash === String(pHash));
                                        if (perk) {
                                            artifactPerks.push({ socketIndex: sData.socketIndex, perk });
                                        }
                                    }
                                });
                            }
                        }

                        let actualSetBonuses = [];
                        const setBonusesObj = lData.setBonuses || lData.parameters?.setBonuses;
                        if (setBonusesObj) {
                            Object.entries(setBonusesObj).forEach(([setHash, count]) => {
                                const setDef = db.sets.find(s => String(s.hash) === setHash);
                                if (setDef) {
                                    setDef.perks.forEach(p => {
                                        if (p.count <= count) {
                                            actualSetBonuses.push({ setName: setDef.name, perk: p, setDef: setDef });
                                        }
                                    });
                                }
                            });
                        }

                        let stats = { primary: "Health", secondary: "Class" };
                        let armorPerks = [];
                        let element = chosenSubclass?.element || "neutral";

                        const bData = lData.parameters?.builderData;
                        if (bData) {
                            if (bData.stats) stats = bData.stats;
                            if (bData.element) element = bData.element;
                            if (bData.armorPerks && bData.armorPerks.length > 0 && chosenArmor && chosenArmor.perkColumns) {
                                bData.armorPerks.forEach(pH => {
                                    chosenArmor.perkColumns.forEach(col => {
                                        const matched = col.find(p => p.hash === String(pH));
                                        if (matched && !armorPerks.some(ep => ep.hash === matched.hash)) armorPerks.push(matched);
                                    });
                                });
                            }
                        }

                        setBuild({
                            class: classStr, element, armor: chosenArmor, armorPerks, weapon: chosenWeapon,
                            subclass: chosenSubclass, actualSetBonuses, artifact: bestArtifact, artifactPerks, stats,
                            abilities: { superAbil, grenade, melee, classAbil, jump, aspects: aspects.filter(Boolean), fragments: fragments.filter(Boolean), fragmentCapacity }
                        });
                        
                        window.history.replaceState({}, document.title, window.location.pathname);
                        
                    } catch (e) {
                        console.error("Error parsing loadout URL", e);
                    }
                }
            }, [isReady, db, build]);

            const handleGenerateBuild = () => {
                if (!isReady) return;
                const result = generateBuild(db, selClass, selArmor, selWeapon, selSubclass, selArtifact);
                setBuild(result);
            };

            const createLoadoutObject = (b) => {
                if (!b) return null;
                
                const equippedItems = [];
                if (b.weapon) equippedItems.push({ hash: Number(b.weapon.hash) });
                
                if (b.artifact) {
                    equippedItems.push({ hash: Number(b.artifact.hash) });
                }
                
                if (b.subclass) {
                    const socketOverrides = {};
                    
                    if (b.abilities.superAbil) socketOverrides["0"] = Number(b.abilities.superAbil.hash);
                    if (b.abilities.classAbil) socketOverrides["1"] = Number(b.abilities.classAbil.hash);
                    if (b.abilities.jump) socketOverrides["2"] = Number(b.abilities.jump.hash);
                    if (b.abilities.melee) socketOverrides["3"] = Number(b.abilities.melee.hash);
                    if (b.abilities.grenade) socketOverrides["4"] = Number(b.abilities.grenade.hash);
                    
                    b.abilities.aspects.forEach((a, i) => { 
                        if (a) socketOverrides[String(5 + i)] = Number(a.hash); 
                    });
                    
                    b.abilities.fragments.forEach((f, i) => { 
                        if (f) socketOverrides[String(7 + i)] = Number(f.hash); 
                    });

                    equippedItems.push({
                        hash: Number(b.subclass.hash),
                        socketOverrides: socketOverrides
                    });
                }

                const classTypeNum = parseInt(Object.keys(CLASS_TYPES).find(key => CLASS_TYPES[key] === b.class) || "0");
                
                let notes = `Generated using Random Build tool. Focuses on ${b.weapon?.name} and ${b.armor?.name}.`;
                if (b.armorPerks && b.armorPerks.length > 0) {
                    notes = `Generated using Random Build tool. Focuses on ${b.weapon?.name} and ${b.armor?.name} (${b.armorPerks.map(p => p.name.replace('Spirit of ', '')).join(' / ')}).`;
                }

                const loadout = {
                    name: `Random ${b.class} Build`,
                    notes: notes,
                    classType: classTypeNum,
                    equipped: equippedItems,
                    unequipped: [],
                    parameters: {
                        builderData: {
                            stats: b.stats,
                            armorPerks: b.armorPerks?.map(p => p.hash) || [],
                            element: b.element
                        }
                    }
                };

                if (b.artifact && b.artifactPerks && b.artifactPerks.length > 0) {
                    const intrinsicHashes = b.artifact.intrinsics ? b.artifact.intrinsics.map(p => Number(p.hash)) : [];
                    const selectedHashes = b.artifactPerks.map(ap => Number(ap.perk?.hash || ap.hash));
                    
                    loadout.parameters.artifactUnlocks = {
                        seasonNumber: b.artifact.seasonNumber || 28,
                        unlockedItemHashes: [...intrinsicHashes, ...selectedHashes]
                    };
                }

                if (b.actualSetBonuses && b.actualSetBonuses.length > 0) {
                    loadout.parameters.setBonuses = {};
                    b.actualSetBonuses.forEach(sb => {
                        const current = loadout.parameters.setBonuses[sb.setDef.hash] || 0;
                        loadout.parameters.setBonuses[sb.setDef.hash] = Math.max(current, sb.perk.count);
                    });
                }

                if (b.armor) {
                    loadout.parameters.exoticArmorHash = Number(b.armor.hash);
                }

                return loadout;
            };

            const openInDim = () => {
                const loadout = createLoadoutObject(build);
                if (!loadout) return;
                
                const dimLoadout = JSON.parse(JSON.stringify(loadout));
                delete dimLoadout.parameters.builderData;

                const jsonStr = JSON.stringify(dimLoadout);
                const dimUrl = `https://app.destinyitemmanager.com/loadouts?loadout=${encodeURIComponent(jsonStr)}`;
                
                window.open(dimUrl, '_blank');
            };
            
            const openShare = async () => {
                const loadout = createLoadoutObject(build);
                if (!loadout) return;
                
                const jsonStr = JSON.stringify(loadout);
                const base64Str = btoa(unescape(encodeURIComponent(jsonStr)));
                const url = `https://d2builder.algotician.com?loadout=${encodeURIComponent(base64Str)}`;
                
                if (navigator.share) {
                    try {
                        await navigator.share({
                            title: 'Destiny 2 Build Generator',
                            url: url
                        });
                        return; 
                    } catch (err) {
                        if (err.name === 'AbortError') return; 
                        console.log("Native share failed, falling back to modal.", err);
                    }
                }
                
                setShareUrl(url);
                setShowShareModal(true);
                setCopied(false);
            };

            const copyShareUrl = () => {
                const input = document.createElement('input');
                input.value = shareUrl;
                document.body.appendChild(input);
                input.select();
                document.execCommand('copy');
                document.body.removeChild(input);
                setCopied(true);
                setTimeout(() => setCopied(false), 2000); 
            };

            if (!isReady) {
                return (
                    <div className="flex flex-col items-center justify-center min-h-screen">
                        <div className="spinner mb-4"></div>
                        <h2 className="text-xl font-bold tracking-wider">{status}</h2>
                        <p className="text-slate-400 mt-2 max-w-md text-center text-sm">Downloading and parsing manifest data. This runs entirely in your browser.</p>
                    </div>
                );
            }

            return (
                <div className="max-w-5xl mx-auto p-4 py-12">
                    <div className="text-center mb-10">
                        <h1 className="text-4xl font-black uppercase tracking-widest text-transparent bg-clip-text bg-gradient-to-r from-slate-200 to-slate-500 mb-2">Destiny 2 Build Generator</h1>
                        <p className="text-slate-400">Set your starting points, or leave them blank for true chaos.</p>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-12 gap-6 mb-8">
                        <div className="d2-card rounded-lg p-6 md:col-span-4 self-start md:sticky md:top-4">
                            <h3 className="text-lg font-bold mb-4 uppercase tracking-wider text-slate-300">Seed Parameters</h3>
                            
                            <div className="space-y-4">
                                <div>
                                    <label className="block text-xs uppercase text-slate-400 mb-1">Class</label>
                                    <select value={selClass} onChange={e => { setSelClass(e.target.value); setSelArmor(""); setSelSubclass(""); }} className="w-full bg-slate-800 border border-slate-600 rounded p-2 text-white focus:outline-none focus:border-blue-400">
                                        <option value="">Any Class</option>
                                        <option value="0">Titan</option>
                                        <option value="1">Hunter</option>
                                        <option value="2">Warlock</option>
                                    </select>
                                </div>
                                
                                <div>
                                    <label className="block text-xs uppercase text-slate-400 mb-1">Specific Exotic Armor</label>
                                    <select value={selArmor} onChange={e => setSelArmor(e.target.value)} className="w-full bg-slate-800 border border-slate-600 rounded p-2 text-white focus:outline-none focus:border-blue-400">
                                        <option value="">Random Armor</option>
                                        {db.armor.filter(a => selClass === "" || a.classType.toString() === selClass).sort((a,b)=>a.name.localeCompare(b.name)).map(a => (
                                            <option key={a.hash} value={a.hash}>{a.name}</option>
                                        ))}
                                    </select>
                                </div>

                                <div>
                                    <label className="block text-xs uppercase text-slate-400 mb-1">Specific Exotic Weapon</label>
                                    <select value={selWeapon} onChange={e => setSelWeapon(e.target.value)} className="w-full bg-slate-800 border border-slate-600 rounded p-2 text-white focus:outline-none focus:border-blue-400">
                                        <option value="">Random Weapon (Synergy Based)</option>
                                        {db.weapons.sort((a,b)=>a.name.localeCompare(b.name)).map(w => (
                                            <option key={w.hash} value={w.hash}>{w.name}</option>
                                        ))}
                                    </select>
                                </div>

                                <div>
                                    <label className="block text-xs uppercase text-slate-400 mb-1">Subclass</label>
                                    <select value={selSubclass} onChange={e => setSelSubclass(e.target.value)} className="w-full bg-slate-800 border border-slate-600 rounded p-2 text-white focus:outline-none focus:border-blue-400">
                                        <option value="">Random Subclass</option>
                                        {db.subclasses.filter(s => selClass === "" || s.classType.toString() === selClass).sort((a,b)=>a.name.localeCompare(b.name)).map(s => (
                                            <option key={s.hash} value={s.hash}>{s.name}</option>
                                        ))}
                                    </select>
                                </div>
                                
                                <div>
                                    <label className="block text-xs uppercase text-slate-400 mb-1">Artifact</label>
                                    <select value={selArtifact} onChange={e => setSelArtifact(e.target.value)} className="w-full bg-slate-800 border border-slate-600 rounded p-2 text-white focus:outline-none focus:border-blue-400">
                                        <option value="">Random Artifact (Synergy Based)</option>
                                        {db.artifacts.map(a => (
                                            <option key={a.hash} value={a.hash} >{a.name}</option>
                                        ))}
                                    </select>
                                </div>
                            </div>

                            <button 
                                onClick={handleGenerateBuild}
                                className="mt-6 w-full py-3 bg-white text-slate-900 font-bold uppercase tracking-widest rounded hover:bg-slate-200 transition-colors shadow-[0_0_15px_rgba(255,255,255,0.3)]">
                                Create Build
                            </button>
                        </div>

                        <div className={`d2-card rounded-lg flex flex-col md:col-span-8 ${build ? 'element-bg-' + build.element : ''}`}>
                            {!build ? (
                                <div className="flex-1 flex items-center justify-center text-slate-500 p-6 text-center min-h-[400px]">
                                    Configure parameters and click "Create Build" to generate your loadout.
                                </div>
                            ) : (
                                <div className="p-6 flex-1 flex flex-col h-full">
                                    <div className="flex justify-between items-start mb-6">
                                        <div>
                                            <h2 className="text-3xl font-black tracking-wider uppercase">{build.class}</h2>
                                            <p className="text-slate-400 text-sm capitalize font-bold">{build.element} Element Synergy</p>
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={openShare} className="text-xs bg-slate-700 border border-slate-500 hover:border-slate-400 px-3 py-2 rounded transition-colors flex items-center gap-2 font-bold uppercase text-white shadow-md">
                                                Share
                                            </button>
                                            <button onClick={openInDim} className="text-xs bg-slate-800 border border-slate-600 hover:border-slate-400 px-3 py-2 rounded transition-colors flex items-center gap-2 font-bold uppercase">
                                                Open in DIM
                                            </button>
                                        </div>
                                    </div>

                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-6">
                                        <div className="bg-slate-800/50 rounded p-4 flex gap-4 items-start">
                                            {build.weapon?.icon && <img src={build.weapon.icon} className="w-16 h-16 rounded border-2 border-[#ceae33] shrink-0 mt-1" alt="Weapon" />}
                                            <div>
                                                <div className="flex items-center gap-2 mb-1">
                                                    <div className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Exotic Weapon</div>
                                                    {build.weapon?.damageType && (
                                                        <span className={`text-[9px] uppercase px-1.5 py-0.5 rounded font-bold tracking-wider border ${
                                                            build.weapon.damageType === 'solar' ? 'bg-orange-900/30 text-orange-400 border-orange-800' :
                                                            build.weapon.damageType === 'void' ? 'bg-purple-900/30 text-purple-400 border-purple-800' :
                                                            build.weapon.damageType === 'arc' ? 'bg-cyan-900/30 text-cyan-400 border-cyan-800' :
                                                            build.weapon.damageType === 'stasis' ? 'bg-blue-900/30 text-blue-400 border-blue-800' :
                                                            build.weapon.damageType === 'strand' ? 'bg-green-900/30 text-green-400 border-green-800' :
                                                            'bg-slate-700/30 text-slate-300 border-slate-600'
                                                        }`}>
                                                            {build.weapon.damageType}
                                                        </span>
                                                    )}
                                                    {build.weapon?.ammoType && (
                                                        <span className={`text-[9px] uppercase px-1.5 py-0.5 rounded font-bold tracking-wider border ${
                                                            build.weapon.ammoType === 'primary' ? 'bg-slate-100/10 text-slate-100 border-slate-300' :
                                                            build.weapon.ammoType === 'special' ? 'bg-green-500/20 text-green-400 border-green-500' :
                                                            build.weapon.ammoType === 'heavy' ? 'bg-purple-500/20 text-purple-400 border-purple-500' :
                                                            'bg-slate-700/30 text-slate-300 border-slate-600'
                                                        }`}>
                                                            {build.weapon.ammoType}
                                                        </span>
                                                    )}
                                                </div>
                                                <div className="font-bold text-[#ceae33] text-lg leading-none mb-1.5">{build.weapon?.name}</div>
                                                {build.weapon?.perkName && <div className="text-xs font-semibold text-slate-300 mb-0.5">{build.weapon.perkName}</div>}
                                                <div className="text-[11px] text-slate-400 leading-tight">{build.weapon?.desc}</div>
                                            </div>
                                        </div>
                                        <div className="bg-slate-800/50 rounded p-4 flex gap-4 items-start">
                                            {build.armor?.icon && <img src={build.armor.icon} className="w-16 h-16 rounded border-2 border-[#ceae33] shrink-0 mt-1" alt="Armor" />}
                                            <div>
                                                <div className="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1">Exotic Armor</div>
                                                <div className="font-bold text-[#ceae33] text-lg leading-none mb-1.5">{build.armor?.name}</div>
                                                
                                                {build.armorPerks && build.armorPerks.length > 0 ? (
                                                    <div className="mt-3 space-y-2">
                                                        {build.armorPerks.map((p, idx) => (
                                                            <div key={idx} className="flex gap-2 items-start bg-slate-900/50 p-2 rounded border border-slate-700/50">
                                                                {p.icon && <img src={p.icon} className="w-6 h-6 rounded border border-slate-600" alt="Perk" />}
                                                                <div>
                                                                    <div className="text-xs font-bold text-slate-200 leading-none mb-1">{p.name}</div>
                                                                    <div className="text-[10px] text-slate-400 leading-tight">{p.desc}</div>
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                ) : (
                                                    <React.Fragment>
                                                        {build.armor?.perkName && <div className="text-xs font-semibold text-slate-300 mb-0.5">{build.armor.perkName}</div>}
                                                        <div className="text-[11px] text-slate-400 leading-tight">{build.armor?.desc}</div>
                                                    </React.Fragment>
                                                )}
                                            </div>
                                        </div>
                                    </div>

                                    <div className="bg-slate-800/50 rounded p-4 mb-6 flex flex-row items-center justify-around border border-slate-700/50 shadow-inner">
                                        <div className="text-center">
                                            <div className="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1">Recommended Primary Stat</div>
                                            <div className="font-black text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-emerald-400 text-2xl tracking-wider">{build.stats.primary}</div>
                                        </div>
                                        <div className="w-px h-10 bg-slate-700"></div>
                                        <div className="text-center">
                                            <div className="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1">Recommended Secondary Stat</div>
                                            <div className="font-bold text-slate-200 text-xl tracking-wider">{build.stats.secondary}</div>
                                        </div>
                                    </div>

                                    <div className="bg-slate-800/50 rounded p-5 mb-4">
                                        <h3 className="text-sm font-bold uppercase tracking-widest mb-4 border-b border-slate-700 pb-2 text-slate-300">Subclass & Core Abilities</h3>
                                        
                                        <div className="flex items-center gap-4 mb-6 bg-slate-900/50 p-3 rounded">
                                            {build.subclass?.icon && <img src={build.subclass.icon} className="w-12 h-12 rounded-full bg-slate-800" alt="Subclass" />}
                                            <div>
                                                <span className="font-bold text-xl block text-white">{build.subclass?.name || "Subclass"}</span>
                                            </div>
                                        </div>

                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 text-sm">
                                            {[
                                                { label: 'Super', data: build.abilities.superAbil },
                                                { label: 'Class Ability', data: build.abilities.classAbil },
                                                { label: 'Movement', data: build.abilities.jump },
                                                { label: 'Melee', data: build.abilities.melee },
                                                { label: 'Grenade', data: build.abilities.grenade }
                                            ].map((slot, i) => slot.data && (
                                                <div key={i} className="flex items-start gap-3 bg-slate-900/50 p-3 rounded">
                                                    {slot.data.icon && <img src={slot.data.icon} className="w-10 h-10 rounded" alt={slot.label} />}
                                                    <div>
                                                        <span className="text-slate-400 block text-[10px] font-bold uppercase tracking-wider mb-1">{slot.label}</span>
                                                        <span className="font-semibold text-slate-200 block text-base leading-none mb-1">{slot.data.name}</span>
                                                        <p className="text-[11px] text-slate-400 leading-tight">{slot.data.desc}</p>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                    
                                    {build.abilities.aspects && build.abilities.aspects.length > 0 && (
                                        <div className="bg-slate-800/50 rounded p-5 mb-4">
                                            <h3 className="text-sm font-bold uppercase tracking-widest mb-4 border-b border-slate-700 pb-2 text-slate-300">Aspects</h3>
                                            <div className="grid grid-cols-1 gap-4 text-sm">
                                                {build.abilities.aspects.map((aspect, i) => aspect && (
                                                    <div key={i} className="flex items-start gap-3 bg-slate-900/50 p-3 rounded">
                                                        {aspect.icon && <img src={aspect.icon} className="w-12 h-12 rounded border border-slate-700" alt="Aspect" />}
                                                        <div>
                                                            <div className="flex items-center gap-2 mb-1">
                                                                <span className="font-semibold text-slate-200 text-base">{aspect.name}</span>
                                                                <span className="text-[10px] uppercase bg-slate-800 border border-slate-600 px-2 py-0.5 rounded-full text-[#ceae33] font-bold tracking-wider">{aspect.fragmentSlots} Slots</span>
                                                            </div>
                                                            <p className="text-xs text-slate-400 leading-relaxed whitespace-pre-line">{aspect.desc}</p>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {build.abilities.fragments && build.abilities.fragments.length > 0 && (
                                        <div className="bg-slate-800/50 rounded p-5 mb-4">
                                            <h3 className="text-sm font-bold uppercase tracking-widest mb-4 border-b border-slate-700 pb-2 text-slate-300 flex justify-between items-center">
                                                Fragments
                                                <span className="text-[10px] bg-slate-900 px-3 py-1 rounded-full text-slate-300 font-normal">
                                                    {build.abilities.fragments.length} / {build.abilities.fragmentCapacity} Energy Used
                                                </span>
                                            </h3>
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 text-sm">
                                                {build.abilities.fragments.map((frag, i) => frag && (
                                                    <div key={i} className="flex items-start gap-3 bg-slate-900/50 p-3 rounded">
                                                        {frag.icon && <img src={frag.icon} className="w-10 h-10 rounded border border-slate-700" alt="Fragment" />}
                                                        <div>
                                                            <div className="flex flex-wrap items-center gap-2 mb-1">
                                                                <span className="font-semibold text-slate-200 block text-base leading-none">{frag.name}</span>
                                                                {frag.stats && frag.stats.length > 0 && frag.stats.map((stat, idx) => (
                                                                    <span key={idx} className={`text-[9px] uppercase px-1.5 py-0.5 rounded font-bold tracking-wider ${stat.startsWith('+') ? 'bg-green-900/30 text-green-400 border border-green-800' : 'bg-red-900/30 text-red-400 border border-red-800'}`}>
                                                                        {stat}
                                                                    </span>
                                                                ))}
                                                            </div>
                                                            <p className="text-[11px] text-slate-400 leading-tight whitespace-pre-line">{frag.desc}</p>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {build.artifact && build.artifactPerks && build.artifactPerks.length > 0 && (
                                        <div className="bg-slate-800/50 rounded p-5 mb-4">
                                            <h3 className="text-sm font-bold uppercase tracking-widest mb-4 border-b border-slate-700 pb-2 text-slate-300 flex justify-between items-center">
                                                Equipped Artifact
                                                <span className="flex items-center gap-2 bg-slate-900 px-3 py-1 rounded-full">
                                                    <img src={build.artifact.icon} className="w-4 h-4 rounded-full" alt="Artifact" />
                                                    <span className="text-[10px] text-slate-300 font-normal">{build.artifact.name}</span>
                                                </span>
                                            </h3>
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 text-sm">
                                                {build.artifactPerks.map((ap, i) => (
                                                    <div key={i} className="flex items-start gap-3 bg-slate-900/50 p-3 rounded">
                                                        {ap.icon && <img src={ap.icon} className="w-10 h-10 rounded border border-slate-700" alt="Artifact Perk" />}
                                                        <div>
                                                            <div className="font-semibold text-slate-200 block text-base leading-none mb-1">{ap.name}</div>
                                                            <p className="text-[11px] text-slate-400 leading-tight whitespace-pre-line">{ap.desc}</p>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {build.actualSetBonuses && build.actualSetBonuses.length > 0 && (
                                        <div className="bg-slate-800/50 rounded p-5 mt-auto">
                                            <h3 className="text-sm font-bold uppercase tracking-widest mb-4 border-b border-slate-700 pb-2 text-slate-300">Armor Set Bonuses</h3>
                                            <div className="space-y-3">
                                                {build.actualSetBonuses.map((setBonus, i) => (
                                                    <div key={i} className="bg-slate-900/50 p-3 rounded text-sm">
                                                        <div className="font-bold text-[#ceae33] text-[10px] uppercase tracking-wider mb-1">{setBonus.setName} ({setBonus.perk.count}-Piece)</div>
                                                        <div className="text-slate-200 font-semibold mb-1 text-base leading-none">{setBonus.perk.name}</div>
                                                        <div className="text-slate-400 text-xs leading-relaxed">{setBonus.perk.description}</div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                </div>
                            )}
                        </div>
                    </div>
                    
                    {showShareModal && (
                        <div className="fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-slate-900 border border-slate-700 rounded-lg p-6 max-w-lg w-full shadow-2xl relative">
                                <button 
                                    onClick={() => setShowShareModal(false)}
                                    className="absolute top-4 right-4 text-slate-400 hover:text-white transition-colors"
                                >
                                    <svg xmlns="http://www.w3.org/2000/svg" className="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d="M6 18L18 6M6 6l12 12" />
                                    </svg>
                                </button>
                                <h3 className="text-xl font-black text-white mb-2 uppercase tracking-widest border-b border-slate-700 pb-2">Share Loadout</h3>
                                <p className="text-slate-400 text-sm mb-6">Copy this link to share your exact build, including generated stats and exotic traits.</p>
                                
                                <div className="flex flex-col sm:flex-row items-stretch sm:items-center gap-2">
                                    <input 
                                        type="text" 
                                        readOnly 
                                        value={shareUrl}
                                        className="w-full bg-slate-800 border border-slate-600 rounded p-3 text-slate-300 text-sm focus:outline-none focus:border-blue-400 font-mono"
                                        onClick={(e) => e.target.select()}
                                    />
                                    <button 
                                        onClick={copyShareUrl}
                                        className={`px-6 py-3 rounded font-bold uppercase tracking-wider transition-colors shrink-0 shadow-lg ${copied ? 'bg-emerald-600 hover:bg-emerald-500 text-white' : 'bg-blue-600 hover:bg-blue-500 text-white'}`}
                                    >
                                        {copied ? 'Copied!' : 'Copy'}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
